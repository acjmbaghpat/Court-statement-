<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Court Statement Manager — ACJM Baghpat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f5f7fa;--panel:#ffffff;--card:#eef2f7;--border:#d0daea;
  --accent:#1a5fa8;--accent2:#0d4a8a;--text:#1a2a3a;--dim:#6a8aaa;
  --green:#1a7a3a;--red:#cc2222;--gold:#8a6000;--hdr:#1a3a6a;
  --blue-pale:#e8f0fa;--green-pale:#e8f8ee;--red-pale:#fde8e8;
  --row-alt:#f8fafd;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);font-size:12px}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#e8eef5}
::-webkit-scrollbar-thumb{background:#a0bad4;border-radius:3px}
select,select option{font-family:'Courier New',monospace}
button{font-family:'Courier New',monospace;cursor:pointer}

/* Header */
.app-hdr{background:var(--accent2);color:#fff;padding:8px 14px;border-bottom:3px solid var(--accent)}
.app-title{font-size:15px;font-weight:bold;letter-spacing:.5px}
.app-sub{font-size:9px;opacity:.7;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.tab-btn{padding:6px 14px;border-radius:3px 3px 0 0;border:none;font-size:11px;font-weight:bold;cursor:pointer;transition:background .15s}
.tab-btn.act{background:#fff;color:var(--accent2)}
.tab-btn.inact{background:rgba(255,255,255,.15);color:#fff}

/* Inputs */
.inp{background:#fff;color:var(--text);border:1px solid var(--border);border-radius:3px;
  padding:3px 6px;font-family:'Courier New',monospace;outline:none;font-size:11px}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(26,95,168,.15)}
.vi{width:54px;background:#fff;color:var(--text);border:1px solid var(--border);border-radius:2px;
  padding:2px 3px;font-size:10px;text-align:right;font-family:'Courier New',monospace;outline:none}
.vi:focus{border-color:var(--accent);background:var(--blue-pale)}
.vi.ob{border-color:#2a5a9c}
.vi.id,.vi.it{border-color:var(--green)}
.vi.dc,.vi.dn,.vi.dm,.vi.dt{border-color:var(--red)}

/* Tick cells */
.tick{cursor:pointer;text-align:center;padding:3px 2px;user-select:none;
  border-right:1px solid var(--border);border-bottom:1px solid var(--border);transition:background .1s}
.tick.sel{background:#d4edda;color:var(--green);font-weight:bold;font-size:14px}
.tick.unsel{background:#f8f8f8;color:#ccc;font-size:12px}
.tick:hover{background:#e8f8ee}

/* Sidebar */
.sidebar{width:136px;min-width:136px;overflow-y:auto;border-right:2px solid var(--border);background:#f0f4fa}
.grp-btn{width:100%;text-align:left;border:none;border-bottom:1px solid var(--border);
  padding:7px 10px;font-family:'Courier New',monospace;font-size:10px;cursor:pointer;transition:background .1s}
.grp-btn.act{border-left:3px solid var(--accent);background:var(--blue-pale);font-weight:bold;color:var(--hdr)}
.grp-btn.inact{border-left:3px solid transparent;background:transparent;color:var(--dim)}
.grp-btn:hover{background:var(--blue-pale)}

/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{padding:5px 7px;background:var(--blue-pale);color:var(--hdr);font-weight:bold;
  border-bottom:2px solid var(--border);text-align:center;white-space:nowrap;font-size:10px}
.tbl th:first-child{text-align:left}
.tbl td{padding:5px 7px;border-bottom:1px solid var(--border);color:var(--text)}
.tbl td:not(:first-child){text-align:center}
.tbl tr:nth-child(even){background:var(--row-alt)}
.tbl tr.tot{background:var(--blue-pale);font-weight:bold}
.tbl tr.tot td{color:var(--hdr)}
.tbl tr.grn td{color:var(--green)}

/* Stmt tabs */
.stmt-tabs{padding:6px 12px;border-bottom:2px solid var(--border);background:#f0f4fa}
.freq-lbl{font-size:9px;font-weight:bold;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px}
.stab{padding:4px 9px;border-radius:3px;font-size:10px;border:1px solid var(--border);
  cursor:pointer;margin:2px;transition:all .15s;background:#fff;color:var(--hdr);font-family:'Courier New',monospace}
.stab:hover{border-color:var(--accent);color:var(--accent)}
.stab.act{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:bold}
.stab.nodata{color:var(--red);border-color:#e8aaaa}

/* Stmt header */
.shdr{background:var(--blue-pale);border-left:4px solid var(--accent);
  padding:8px 12px;margin-bottom:8px;border-radius:0 4px 4px 0}
.shdr-title{font-size:12px;font-weight:bold;color:var(--hdr)}
.shdr-sub{font-size:10px;color:var(--dim);margin-top:2px}

/* Section headers inside statements */
.sec-hdr{background:var(--card);border-left:3px solid var(--accent);padding:5px 10px;
  margin:10px 0 5px 0;font-size:10px;font-weight:bold;color:var(--hdr);border-radius:0 3px 3px 0}

/* Cards */
.card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:10px}
.card-title{font-size:10px;font-weight:bold;color:var(--hdr);margin-bottom:8px;letter-spacing:.5px}

/* Buttons */
.btn-pri{padding:5px 14px;background:var(--accent);color:#fff;border:none;border-radius:3px;font-weight:bold;font-size:11px;cursor:pointer}
.btn-pri:hover{background:var(--accent2)}
.btn-sec{padding:5px 12px;background:#fff;color:var(--dim);border:1px solid var(--border);border-radius:3px;font-size:11px;cursor:pointer}
.btn-sec:hover{border-color:var(--accent);color:var(--accent)}
.btn-grn{padding:5px 12px;background:var(--green-pale);color:var(--green);border:1px solid #90d0a0;border-radius:3px;font-size:11px;font-weight:bold;cursor:pointer}
.btn-red{padding:5px 12px;background:var(--red-pale);color:var(--red);border:1px solid #e8aaaa;border-radius:3px;font-size:11px;cursor:pointer}

/* Firebase badge */
.fb-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:bold}
.fb-ok{background:#e8f8ee;color:var(--green);border:1px solid #90d0a0}
.fb-err{background:var(--red-pale);color:var(--red);border:1px solid #e8aaaa}
.fb-syn{background:#fff8e0;color:var(--gold);border:1px solid #e0c070}
.fb-off{background:var(--card);color:var(--dim);border:1px solid var(--border)}

/* Modal overlay */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:8px;padding:24px;width:500px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2)}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
var e=React.createElement, useState=React.useState, useEffect=React.useEffect;

// ═══════════════════════════
// CONSTANTS
// ═══════════════════════════
var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
var YEARS=(function(){var a=[];for(var i=0;i<36;i++)a.push(1993+i);return a;})();

var GROUPS=[
  {id:"wss",lbl:"W/S State",col:"#1a5fa8",
   types:[{id:"ipc",lbl:"IPC"},{id:"arms",lbl:"Arms Act"},{id:"ex",lbl:"Excise Act"},
          {id:"mpmla",lbl:"MP/MLA"},{id:"ndps",lbl:"NDPS"},{id:"ec",lbl:"3/7 EC"},
          {id:"coth",lbl:"Cmtl.Other"},{id:"crape",lbl:"Cmtl.Rape"},{id:"sh",lbl:"Sex.Har."},
          {id:"wso",lbl:"Other"}]},
  {id:"wsc",lbl:"W/S Complaint",col:"#3a5a9c",types:[{id:"wco",lbl:"W/S Compl"}]},
  {id:"sms",lbl:"Summons State",col:"#1a6a3a",
   types:[{id:"s716",lbl:"7/16 OF"},{id:"fss",lbl:"FSS"},{id:"sso",lbl:"Other"}]},
  {id:"smc",lbl:"Summons Compl",col:"#1a5a4a",types:[{id:"ni",lbl:"NI Act 138"},{id:"sco",lbl:"Oth.Compl"}]},
  {id:"pet",lbl:"Petty/Challan",col:"#7a4a1a",
   types:[{id:"mv",lbl:"MV Act"},{id:"och",lbl:"Oth.Challan"},{id:"wm",lbl:"W/M Challan"}]},
  {id:"fr",lbl:"Final Report",col:"#8a1a1a",types:[{id:"fr",lbl:"FR"}]},
  {id:"cmc",lbl:"Criminal Misc",col:"#5a1a8a",
   types:[{id:"cmc",lbl:"CMC"},{id:"b173",lbl:"173 BNSS"},{id:"bail",lbl:"Bail"}]},
];

var ALL_PAIRS=[];
GROUPS.forEach(function(g){g.types.forEach(function(t){ALL_PAIRS.push([g.id,t.id]);});});
var P_FR=[["fr","fr"]];
var P_PETTY=[["pet","mv"],["pet","och"],["pet","wm"]];
var P_MISC=[["cmc","cmc"],["cmc","b173"],["cmc","bail"]];
var P_TRIAL=ALL_PAIRS.filter(function(p){return p[0]!=="cmc";});
var P_NONFR=ALL_PAIRS.filter(function(p){return !(p[0]==="fr"&&p[1]==="fr");});

var BU_ROWS=[
  {lbl:"1. Criminal Warrant Trial Cases (W/S State & Complaint)",
   pairs:ALL_PAIRS.filter(function(p){return p[0]==="wss"||p[0]==="wsc";})},
  {lbl:"2. Criminal Summon Trial Cases (State & Complaint)",
   pairs:ALL_PAIRS.filter(function(p){return p[0]==="sms"||p[0]==="smc";})},
  {lbl:"3. Criminal Summary Trial (W/M Challan)",pairs:[["pet","wm"]]},
  {lbl:"4. Petty Offences (MV Act + Other Challan)",pairs:[["pet","mv"],["pet","och"]]},
  {lbl:"5. Cases under DV Act 2005",pairs:[]},
  {lbl:"6. Final Reports",pairs:[["fr","fr"]]},
  {lbl:"7. Criminal Misc Cases (CMC excl.173 & Bail)",pairs:[["cmc","cmc"]]},
  {lbl:"8. Applications u/s 173 BNSS",pairs:[["cmc","b173"]]},
  {lbl:"9. Bail Applications",pairs:[["cmc","bail"]]},
];

var APAR_SLABS=[
  {lbl:"5-10 years", yr:"2014-2019",yrs:YEARS.filter(function(y){return y>=2014&&y<=2019;})},
  {lbl:"10-20 years",yr:"2005-2013",yrs:YEARS.filter(function(y){return y>=2005&&y<=2013;})},
  {lbl:"20-30 years",yr:"1994-2004",yrs:YEARS.filter(function(y){return y>=1994&&y<=2004;})},
];

var STMTS=[
  {id:"info",lbl:"Information",freq:"M"},
  {id:"pendency",lbl:"Pendency/Arrears",freq:"M"},
  {id:"breakup",lbl:"Breakup",freq:"M"},
  {id:"contested",lbl:"Contested/NC",freq:"M"},
  {id:"act_dispo",lbl:"Actual Disposal",freq:"M"},
  {id:"apar",lbl:"Apar DJ",freq:"M"},
  {id:"rape_mla",lbl:"Rape/MP-MLA",freq:"M"},
  {id:"ndps",lbl:"NDPS",freq:"M"},
  {id:"petty_ni",lbl:"Petty & NI",freq:"M"},
  {id:"petty_np",lbl:"Petty/Non-Petty",freq:"M"},
  {id:"mthly_petty",lbl:"Monthly Petty",freq:"M"},
  {id:"petty_acd",lbl:"Proforma A+C+Summons",freq:"M"},
  {id:"s3",lbl:"S3 Special",freq:"M"},
  {id:"ni_breakup",lbl:"NI Breakup",freq:"M"},
  {id:"mthly1",lbl:"Monthly-1 (Proforma 1-4)",freq:"M"},
  {id:"mthly2",lbl:"Monthly-2 (Age/Conv.)",freq:"M"},
  {id:"mthly3",lbl:"Monthly-3 (Sessions)",freq:"M"},
  {id:"yr7old",lbl:"7 Year Old Cases",freq:"M"},
  {id:"crpc299",lbl:"299 CrPC",freq:"M"},
  {id:"mission",lbl:"Mission Mode Bimonthly",freq:"M"},
  {id:"quota",lbl:"Out-turn / Quota",freq:"M"},
  {id:"qtr_sh",lbl:"Quarterly SH Cases",freq:"Q"},
  {id:"qtr_inst",lbl:"Quarterly Inst/Dispo",freq:"Q"},
  {id:"new_qtr",lbl:"Quarterly Statistical",freq:"Q"},
  {id:"ni_qtr",lbl:"NI Quarterly",freq:"Q"},
  {id:"half1",lbl:"Half Yearly Stmt 3",freq:"H"},
  {id:"half2",lbl:"Half Yearly Stmt 7",freq:"H"},
  {id:"yearly",lbl:"Yearly — Annexure IV",freq:"Y"},
];

var FREQ_GROUPS=[
  {id:"M",lbl:"📅 Monthly",col:"#1a5fa8"},
  {id:"Q",lbl:"📆 Quarterly",col:"#1a6a3a"},
  {id:"H",lbl:"📋 Half Yearly",col:"#6a3a8a"},
  {id:"Y",lbl:"📊 Yearly",col:"#7a4a1a"},
];

// ═══════════════════════════
// STORAGE & DATA HELPERS
// ═══════════════════════════
var SKEY="csm_v9";
var N=function(v){return Number(v)||0;};
var getMK=function(m,y){return y+"-"+("0"+(m+1)).slice(-2);};
var ld=function(){try{return JSON.parse(localStorage.getItem(SKEY))||{};}catch(x){return{};}};
var sv_=function(d){try{localStorage.setItem(SKEY,JSON.stringify(d));}catch(x){}};
var uid_=function(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);};
var mth=function(m,y){return MONTHS[m]+" "+y;};
var lastDay=function(m,y){return new Date(y,m+1,0).getDate();};
var dStr=function(m,y){return ("0"+lastDay(m,y)).slice(-2)+"."+("0"+(m+1)).slice(-2)+"."+y;};

// Entry operations — all pure (return new state)
var getEnt=function(all,mk){return (all[mk]||{}).entries||[];};
var getMan=function(all,mk,k,df){var v=((all[mk]||{}).manual||{})[k];return v!==undefined?v:(df||"0");};
var ow_=function(){var r={};for(var i=0;i<arguments.length;i++){var o=arguments[i]||{};for(var k in o)if(Object.prototype.hasOwnProperty.call(o,k))r[k]=o[k];}return r;};
var setEntFn=function(all,mk,en){
  var md=ow_(all[mk]||{}); var ents=(md.entries||[]).slice();
  var idx=-1; for(var i=0;i<ents.length;i++){if(ents[i].id===en.id){idx=i;break;}}
  if(idx>=0)ents[idx]=ow_(en);else ents.push(ow_(en));
  md.entries=ents; var nd=ow_(all); nd[mk]=md; return nd;
};
var delEntFn=function(all,mk,id){
  var md=ow_(all[mk]||{}); md.entries=(md.entries||[]).filter(function(e_){return e_.id!==id;});
  var nd=ow_(all); nd[mk]=md; return nd;
};
var setManFn=function(all,mk,k,v){
  var md=ow_(all[mk]||{}); md.manual=ow_(md.manual||{}); md.manual[k]=v;
  var nd=ow_(all); nd[mk]=md; return nd;
};

// Entry OB — auto-carry from prev month if not set
var entOB=function(en,prevEnt){
  if(en.ob!==""&&en.ob!==undefined) return N(en.ob);
  var pm=prevEnt.filter(function(p){return p.gid===en.gid&&p.tid===en.tid&&p.yr===en.yr;});
  if(!pm.length) return 0;
  return pm.reduce(function(s,p){
    return s+N(p.ob)+N(p.inst)+N(p.itrf)-N(p.dc)-N(p.dn)-N(p.dm)-N(p.dt);
  },0);
};
var entCl=function(en,pe){return entOB(en,pe)+N(en.inst)+N(en.itrf)-N(en.dc)-N(en.dn)-N(en.dm)-N(en.dt);};

// Aggregates — all pure
var sumF_=function(ents,pe,pairs,fid,yrs){
  if(!pairs||!pairs.length) return 0;
  return ents.reduce(function(t,en){
    if(!pairs.some(function(p){return p[0]===en.gid&&p[1]===en.tid;})) return t;
    if(yrs&&yrs.indexOf(en.yr)<0) return t;
    if(fid==="ob") return t+entOB(en,pe);
    if(fid==="cl") return t+entCl(en,pe);
    return t+N(en[fid]);
  },0);
};
var sumFs_=function(ents,pe,pairs,fids,yrs){
  if(!pairs||!pairs.length) return 0;
  return fids.reduce(function(s,f){return s+sumF_(ents,pe,pairs,f,yrs);},0);
};
var Cl_=function(ents,pe,pairs,yrs){
  if(!pairs||!pairs.length) return 0;
  return sumF_(ents,pe,pairs,"ob",yrs)+sumF_(ents,pe,pairs,"inst",yrs)+sumF_(ents,pe,pairs,"itrf",yrs)
        -sumFs_(ents,pe,pairs,["dc","dn","dm","dt"],yrs);
};
var ClY_=function(ents,pe,pairs,yr){
  if(!pairs||!pairs.length) return 0;
  return ents.reduce(function(t,en){
    if(!pairs.some(function(p){return p[0]===en.gid&&p[1]===en.tid;})) return t;
    if(en.yr!==yr) return t;
    return t+entCl(en,pe);
  },0);
};

// ═══════════════════════════
// FIREBASE
// ═══════════════════════════
var FB_URL_KEY="csm_fb_url"; var FB_SEC_KEY="csm_fb_sec"; var FB_PATH="csm_acjm_v9";
var fbUrl=function(){return localStorage.getItem(FB_URL_KEY)||"";};
var fbSec=function(){return localStorage.getItem(FB_SEC_KEY)||"";};
var fbOk=function(){return !!(fbUrl()&&fbSec());};
var fbEndpt=function(){return fbUrl().replace(/\/+$/,"")+"/"+ FB_PATH+".json?auth="+fbSec();};
var fbPush=function(data,cb){
  if(!fbOk()){if(cb)cb("nc");return;}
  fetch(fbEndpt(),{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)})
    .then(function(r){if(cb)cb(r.ok?"ok":"err");}).catch(function(){if(cb)cb("err");});
};
var fbPull=function(){
  if(!fbOk()) return Promise.resolve(null);
  return fetch(fbEndpt()).then(function(r){return r.ok?r.json():null;}).catch(function(){return null;});
};

// ═══════════════════════════
// APP
// ═══════════════════════════
function App(){
  var today=new Date();
  var _selM=useState(today.getMonth()); var selM=_selM[0]; var setSelM=_selM[1];
  var _selY=useState(2026);             var selY=_selY[0]; var setSelY=_selY[1];
  var _tab=useState("entry");           var tab=_tab[0];   var setTab=_tab[1];
  var _grp=useState("wss");             var grpId=_grp[0]; var setGrpId=_grp[1];
  var _sid=useState("info");            var sid=_sid[0];   var setSid=_sid[1];
  var _all=useState(ld);                var all=_all[0];   var setAll=_all[1];
  var _mod=useState(null);              var modal=_mod[0]; var setModal=_mod[1]; // null|"fb"|"io"
  var _sync=useState("idle");           var syncSt=_sync[0]; var setSyncSt=_sync[1];
  var _lt=useState("");                 var lastT=_lt[0];  var setLastT=_lt[1];

  var mk=getMK(selM,selY);
  var prevMk=selM===0?(selY-1)+"-12":selY+"-"+("0"+selM).slice(-2);
  var ents=getEnt(all,mk);
  var pents=getEnt(all,prevMk);
  var ml=mth(selM,selY);
  var hasData=ents.length>0;

  function upd(nd){setAll(nd);sv_(nd);if(fbOk()){setSyncSt("syn");fbPush(nd,function(r){setSyncSt(r==="ok"?"ok":"err");if(r==="ok")setLastT(new Date().toLocaleTimeString());});}}

  // Auto pull on load
  var _init=useState(false); var init=_init[0]; var setInit=_init[1];
  if(!init){setInit(true);if(fbOk()){setSyncSt("syn");fbPull().then(function(r){if(r){var m2=ow_(ld(),r);setAll(m2);sv_(m2);}setSyncSt(r?"ok":"err");if(r)setLastT(new Date().toLocaleTimeString());});}}

  function doSync(){
    if(!fbOk()){setModal("fb");return;}
    setSyncSt("syn");
    fbPull().then(function(r){
      if(r){var m2=ow_(ld(),r);setAll(m2);sv_(m2);setSyncSt("ok");setLastT(new Date().toLocaleTimeString());}
      else setSyncSt("err");
    });
  }

  var syncCls={"idle":"fb-off","syn":"fb-syn","ok":"fb-ok","err":"fb-err"}[syncSt]||"fb-off";
  var syncLbl={"idle":"⟳ Sync","syn":"⏳ Syncing…","ok":"✓ "+lastT,"err":"✗ Error"}[syncSt]||"⟳";

  return e("div",{style:{minHeight:"100vh",background:"var(--bg)"}},
    // Modal
    modal==="fb"?e(FbModal,{onClose:function(){setModal(null);}}):null,
    modal==="io"?e(IOModal,{all:all,setAll:function(d){setAll(d);sv_(d);},onClose:function(){setModal(null);}}):null,

    // HEADER
    e("div",{className:"app-hdr"},
      e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"8px"}},
        e("div",null,
          e("div",{className:"app-sub"},"⚖ ACJM Baghpat — Court No. 15"),
          e("div",{className:"app-title"},"Court Statement Manager")
        ),
        e("div",{style:{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}},
          e("select",{value:selM,onChange:function(ev){setSelM(+ev.target.value);},
            style:{padding:"4px 6px",borderRadius:"3px",border:"none",background:"rgba(255,255,255,.9)",fontSize:"11px"}},
            MONTHS.map(function(m,i){return e("option",{key:i,value:i},m);})),
          e("select",{value:selY,onChange:function(ev){setSelY(+ev.target.value);},
            style:{padding:"4px 6px",borderRadius:"3px",border:"none",background:"rgba(255,255,255,.9)",fontSize:"11px"}},
            [2024,2025,2026,2027,2028].map(function(y){return e("option",{key:y,value:y},y);})),
          e("button",{className:"fb-badge "+syncCls,onClick:doSync,title:"Click to sync with Firebase"},
            fbOk()?"🔥 "+syncLbl:"🔥 Firebase"),

function IOModal(p){

  function importJSON(){
    var inp=document.createElement("input"); inp.type="file"; inp.accept=".json";

      var rd=new FileReader(); rd.onload=function(e_){
        try{var d=JSON.parse(e_.target.result); p.setAll(d); setMsg("✓ Data imported successfully!");}

          e("button",{onClick:clearAll,className:"btn-red"},"Clear All Data")

  var ClY=function(pairs,yr){return ClY_(ents,pents,pairs,yr);};
  var gm=function(k,df){return getMan(all,mk,k,df);};

      ["Criminal Cases",F(ALL_PAIRS,"ob",y7),F(ALL_PAIRS,"inst",y7)+F(ALL_PAIRS,"itrf",y7),Fs(ALL_PAIRS,["dc","dn","dm"],y7),Cl(ALL_PAIRS,y7)],
      ["Criminal Misc",F(P_MISC,"ob",y7),F(P_MISC,"inst",y7)+F(P_MISC,"itrf",y7),Fs(P_MISC,["dc","dn","dm"],y7),Cl(P_MISC,y7)],
      ["Civil","—","—","—","—"]]);

    addS("NI Breakup",[["NI Act (138) Breakup — "+ml2],[],
      ["Court","Opening","Institution","Disposal","Closing"],
      ["ACJM Baghpat",F(niP,"ob"),F(niP,"inst")+F(niP,"itrf"),Fs(niP,["dc","dn"]),Cl(niP)],[],
      ["Stage-wise"],["Appearance",N(gm("ni_app"))],["Hearing",N(gm("ni_hear"))],["Final",N(gm("ni_fin"))],[],
      ["Year-wise Closing"],["Year"].concat(actYrs.filter(function(y){return y>=2010;})).concat(["Total"]),
      ["Closing"].concat(actYrs.filter(function(y){return y>=2010;}).map(function(yr){return Cl(niP,[yr]);})).concat([Cl(niP)])]);

    addS("Mission Mode",[["Mission Mode Bimonthly — "+ml2],[],
      ["Sr.No.","Type of Cases","Pendency"],
      ["1","Session Trial (manual)",N(gm("mm_ses"))],
      ["2","Warrant Trial",Cl(ALL_PAIRS.filter(function(p_){return p_[0]==="wss"||p_[0]==="wsc";}))],
      ["3","Arms Act",Cl([["wss","arms"]])],
      ["5","NI Act 138",Cl([["smc","ni"]])],
      ["6","Summon Trial",Cl(ALL_PAIRS.filter(function(p_){return p_[0]==="sms"||p_[0]==="smc";}))],
      ["8","Traffic Challan",Cl([["pet","mv"]])],
      ["12","Excise Act",Cl([["wss","ex"]])],
      ["19","NDPS Act",Cl([["wss","ndps"]])]]);

    addS("Quarterly Inst Dispo",[["Quarterly Inst/Dispo — "+ml2],[],
      ["Quarter","Cases Brought Forward","Freshly Instituted","Disposed","Pending at End"],
      [ml2,cOB,cI,Fs(ALL_PAIRS,["dc","dn","dm","dt"]),cCl]]);

    addS("Yearly Annexure IV",[["Annexure IV — Annual Statement — "+selY],[],
      ["Court","Cases Brought Forward","Freshly Instituted","Disposed","Pending at End"],
      ["ACJM Baghpat",cOB,cI,Fs(ALL_PAIRS,["dc","dn","dm","dt"]),cCl],[],
      ["Age-wise Pendency"],["Nature","Upto 1yr","1-2 yrs","Over 2 yrs","Over 5 yrs"],
      ["Criminal",Cl(ALL_PAIRS,YEARS.filter(function(y){return y>=selY-1;})),
        Cl(ALL_PAIRS,[selY-2]),Cl(ALL_PAIRS,YEARS.filter(function(y){return y<=selY-2;})),
        Cl(ALL_PAIRS,YEARS.filter(function(y){return y<=selY-5;}))],[],
      ["Strength of Judges"],["Sanctioned",N(gm("yr_sanc"))],["Working",N(gm("yr_work"))],["Vacancy",N(gm("yr_sanc"))-N(gm("yr_work"))]]);

    XLSX.writeFile(wb,"CourtStatements_"+MONTHS[selM]+selY+"_ACJM.xlsx");
  }catch(ex){alert("Export error: "+ex.message);}
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
