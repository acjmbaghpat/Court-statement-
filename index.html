<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Court Statement Automation</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- XLSX -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- File Saver -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    body{
      margin:0;
      padding:20px;
      background:#f3f4f6;
      font-family:Arial, Helvetica, sans-serif;
    }

    table{
      border-collapse: collapse;
      width:100%;
    }

    th,td{
      border:1px solid #d1d5db;
      padding:8px;
      text-align:center;
    }

    th{
      background:#e5e7eb;
    }

    input,select{
      width:100%;
      padding:10px;
      border:1px solid #d1d5db;
      border-radius:6px;
    }

    button{
      padding:10px 20px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      color:white;
      font-weight:bold;
    }

    .blue{
      background:#2563eb;
    }

    .green{
      background:#16a34a;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
      box-shadow:0 2px 5px rgba(0,0,0,0.1);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
    }
  </style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

const CASE_TYPES = [
  {
    type: "W/S State",
    categories: [
      "Arms Act",
      "Excise Act",
      "MP/MLA",
      "NDPS",
      "Commital",
      "Sexual Harassment",
      "3/7 EC",
      "Other"
    ]
  },

  {
    type: "Summons State",
    categories: [
      "7/16 OF",
      "FSS",
      "Other"
    ]
  },

  {
    type: "Summons Complaint",
    categories: [
      "NI Act",
      "Other Complaint"
    ]
  },

  {
    type: "Petty",
    categories: [
      "MV Act",
      "Other Challan",
      "W/M Challan"
    ]
  },

  {
    type: "FR",
    categories: [
      "FR"
    ]
  },

  {
    type: "CMC",
    categories: [
      "173 BNSS",
      "Other Misc",
      "Bail"
    ]
  }
];

function calculatePendency(
  opening,
  institution,
  transferIn,
  disposal,
  transferOut
){
  return (
    Number(opening) +
    Number(institution) +
    Number(transferIn) -
    Number(disposal) -
    Number(transferOut)
  );
}

function getActualDisposal(
  contested,
  nonContested,
  direct,
  committal,
  transfer
){
  return (
    Number(contested) +
    Number(nonContested) +
    Number(direct) +
    Number(committal) +
    Number(transfer)
  );
}

function App(){

  const [month,setMonth] = React.useState("April-2026");

  const [entries,setEntries] = React.useState([]);

  const [form,setForm] = React.useState({
    type:"",
    category:"",
    year:"",
    opening:0,
    institution:0,
    disposal:0,
    transferIn:0,
    transferOut:0,
    contested:0,
    nonContested:0,
    direct:0,
    committal:0,
    transfer:0
  });

  React.useEffect(() => {
    const data = localStorage.getItem(month);

    if(data){
      setEntries(JSON.parse(data));
    }else{
      setEntries([]);
    }
  },[month]);

  const addEntry = () => {

    const pending = calculatePendency(
      form.opening,
      form.institution,
      form.transferIn,
      form.disposal,
      form.transferOut
    );

    const actualDisposal = getActualDisposal(
      form.contested,
      form.nonContested,
      form.direct,
      form.committal,
      form.transfer
    );

    const newEntry = {
      ...form,
      pending,
      actualDisposal
    };

    const updated = [...entries,newEntry];

    setEntries(updated);

    localStorage.setItem(
      month,
      JSON.stringify(updated)
    );

    alert("Entry Added");
  };

  const exportExcel = () => {

    const worksheet =
      XLSX.utils.json_to_sheet(entries);

    const workbook =
      XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(
      workbook,
      worksheet,
      "Monthly Statement"
    );

    const excelBuffer = XLSX.write(
      workbook,
      {
        bookType:"xlsx",
        type:"array"
      }
    );

    const blob = new Blob(
      [excelBuffer],
      {
        type:"application/octet-stream"
      }
    );

    saveAs(blob, `${month}.xlsx`);
  };

  return (

    <div>

      <h1 className="text-4xl font-bold mb-5">
        Court Statement Automation
      </h1>

      <div className="card">

        <div className="grid">

          <input
            placeholder="Month"
            value={month}
            onChange={(e)=>
              setMonth(e.target.value)
            }
          />

          <select
            value={form.type}
            onChange={(e)=>
              setForm({
                ...form,
                type:e.target.value
              })
            }
          >

            <option value="">
              Select Type
            </option>

            {
              CASE_TYPES.map((item,index)=>(
                <option
                  key={index}
                  value={item.type}
                >
                  {item.type}
                </option>
              ))
            }

          </select>

          <input
            placeholder="Category"
            value={form.category}
            onChange={(e)=>
              setForm({
                ...form,
                category:e.target.value
              })
            }
          />

          <input
            placeholder="Year"
            value={form.year}
            onChange={(e)=>
              setForm({
                ...form,
                year:e.target.value
              })
            }
          />

          <input
            type="number"
            placeholder="Opening"
            value={form.opening}
            onChange={(e)=>
              setForm({
                ...form,
                opening:e.target.value
              })
            }
          />

          <input
            type="number"
            placeholder="Institution"
            value={form.institution}
            onChange={(e)=>
              setForm({
                ...form,
                institution:e.target.value
              })
            }
          />

          <input
            type="number"
            placeholder="Disposal"
            value={form.disposal}
            onChange={(e)=>
              setForm({
                ...form,
                disposal:e.target.value
              })
            }
          />

          <input
            type="number"
            placeholder="Transfer In"
            value={form.transferIn}
            onChange={(e)=>
              setForm({
                ...form,
                transferIn:e.target.value
              })
            }
          />

          <input
            type="number"
            placeholder="Transfer Out"
            value={form.transferOut}
            onChange={(e)=>
              setForm({
                ...form,
                transferOut:e.target.value
              })
            }
          />

        </div>

        <div className="mt-5 flex gap-3">

          <button
            className="blue"
            onClick={addEntry}
          >
            Add Entry
          </button>

          <button
            className="green"
            onClick={exportExcel}
          >
            Download Excel
          </button>

        </div>

      </div>

      <div className="card">

        <table>

          <thead>

            <tr>

              <th>Type</th>
              <th>Category</th>
              <th>Year</th>
              <th>Institution</th>
              <th>Disposal</th>
              <th>Pending</th>
              <th>Actual Disposal</th>

            </tr>

          </thead>

          <tbody>

            {
              entries.map((item,index)=>(

                <tr key={index}>

                  <td>{item.type}</td>
                  <td>{item.category}</td>
                  <td>{item.year}</td>
                  <td>{item.institution}</td>
                  <td>{item.disposal}</td>
                  <td>{item.pending}</td>
                  <td>{item.actualDisposal}</td>

                </tr>

              ))
            }

          </tbody>

        </table>

      </div>

    </div>

  );
}

ReactDOM.createRoot(
  document.getElementById("root")
).render(<App />);

</script>

</body>
</html>
