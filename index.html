<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Court Statement Manager — ACJM Baghpat</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:#070d16;color:#b8cce0;overflow-x:hidden}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0c1620}
::-webkit-scrollbar-thumb{background:#1e4a7a;border-radius:3px}
select option{background:#0c1620;color:#b8cce0}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
var e = React.createElement;
var useState = React.useState;
var useCallback = React.useCallback;

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
var MONTHS = ["January","February","March","April","May","June",
              "July","August","September","October","November","December"];
var YEARS = (function(){var a=[];for(var i=0;i<34;i++)a.push(1993+i);return a;})();

var CAT_GROUPS = [
  {g:"W/S State",col:"#1a3a5c",cats:[
    {id:"ws_arms",lbl:"Arms Act"},{id:"ws_excise",lbl:"Excise Act"},
    {id:"ws_mpmla",lbl:"MP/MLA"},{id:"ws_ndps",lbl:"NDPS"},
    {id:"ws_cr_rape",lbl:"Committal (Rape)"},{id:"ws_cr_oth",lbl:"Committal (Other)"},
    {id:"ws_sh",lbl:"Sexual Harassment"},{id:"ws_ec",lbl:"3/7 EC"},
    {id:"ws_oth",lbl:"Other W/S State"}
  ]},
  {g:"W/S Complaint",col:"#2a3a6c",cats:[{id:"ws_compl",lbl:"W/S Complaint"}]},
  {g:"Summons State",col:"#0d3a20",cats:[
    {id:"s_716",lbl:"7/16 OF"},{id:"s_fss",lbl:"FSS"},{id:"s_st_oth",lbl:"Other State Summons"}
  ]},
  {g:"Summons Complaint",col:"#1a3a2c",cats:[
    {id:"ni_act",lbl:"NI Act (138)"},{id:"s_co_oth",lbl:"Other Complaint"}
  ]},
  {g:"Petty / Challan",col:"#3a2a0a",cats:[
    {id:"mv_act",lbl:"MV Act (Traffic)"},{id:"oth_challan",lbl:"Other Challan"},{id:"wm_challan",lbl:"W/M Challan"}
  ]},
  {g:"Final Report",col:"#3a0a0a",cats:[{id:"fr",lbl:"Final Report (FR)"}]},
  {g:"Criminal Misc",col:"#2a0a3a",cats:[
    {id:"cmc_oth",lbl:"CMC (excl.173 & Bail)"},{id:"cmc_173",lbl:"173 BNSS"},{id:"bail",lbl:"Bail"}
  ]}
];

var ALL_CATS = [];
CAT_GROUPS.forEach(function(g){g.cats.forEach(function(c){ALL_CATS.push(c);});});
var IDS = ALL_CATS.map(function(c){return c.id;});
var MISC_IDS  = ["cmc_oth","cmc_173","bail"];
var PETTY_IDS = ["mv_act","oth_challan","wm_challan"];
var FR_IDS    = ["fr"];
var TRIAL_IDS = IDS.filter(function(i){return MISC_IDS.indexOf(i)<0;});

var BU = {
  warrant:  ["ws_arms","ws_excise","ws_mpmla","ws_ndps","ws_cr_rape","ws_cr_oth","ws_sh","ws_ec","ws_oth","ws_compl"],
  summons:  ["s_716","s_fss","s_st_oth","ni_act","s_co_oth"],
  summary:  ["wm_challan"],
  petty:    ["mv_act","oth_challan"],
  fr:       ["fr"],
  misc_cmc: ["cmc_oth"],
  misc_173: ["cmc_173"],
  misc_bail:["bail"]
};

var APAR_SLABS = [
  {lbl:"5-10 years", yrRange:"2014-2019",yrs:YEARS.filter(function(y){return y>=2014&&y<=2019;})},
  {lbl:"10-20 years",yrRange:"2005-2013",yrs:YEARS.filter(function(y){return y>=2005&&y<=2013;})},
  {lbl:"20-30 years",yrRange:"1994-2004",yrs:YEARS.filter(function(y){return y>=1994&&y<=2004;})},
];

var STMTS = [
  {id:"info",lbl:"Information"},{id:"pendency",lbl:"Pendency/Arrears"},
  {id:"breakup",lbl:"Case Breakup"},{id:"contested",lbl:"Contested/NC"},
  {id:"apar",lbl:"Apar DJ"},{id:"rape_mla",lbl:"Rape/MP-MLA"},
  {id:"ndps",lbl:"NDPS"},{id:"petty_ni",lbl:"Petty & NI"},
  {id:"petty_np",lbl:"Petty/Non-Petty"},{id:"mthly_petty",lbl:"Monthly Petty"},
  {id:"s3",lbl:"S3 Special"},{id:"ni_breakup",lbl:"NI Breakup"}
];

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function N(v){return Number(v)||0;}
function mkYD(){return {id:"",it:"",dc:"",dnc:"",dcm:"",dt:""};}
function instT(yd){return N(yd.id)+N(yd.it);}
function dispT(yd){return N(yd.dc)+N(yd.dnc)+N(yd.dcm)+N(yd.dt);}
function clN(ob,yd){return N(ob)+instT(yd)-dispT(yd);}
function dv(v){return (v===0||v==="-")?"-":v;}
function merge(){var r={};for(var i=0;i<arguments.length;i++){var o=arguments[i];for(var k in o)if(o.hasOwnProperty(k))r[k]=o[k];}return r;}

var SKEY="courtSM_v5";
function loadAll(){try{return JSON.parse(localStorage.getItem(SKEY))||{};}catch(ex){return {};}}
function saveAll(d){try{localStorage.setItem(SKEY,JSON.stringify(d));}catch(ex){}}
function getMK(m,y){return y+"-"+("0"+(m+1)).slice(-2);}

// ═══════════════════════════════════════════
// STYLES
// ═══════════════════════════════════════════
var C={bg:"#070d16",panel:"#0c1620",card:"#101c2a",border:"#162636",
  accent:"#1e4a7a",text:"#b8cce0",dim:"#3a5a78",green:"#2a8a4a",
  greenT:"#4adc8a",redT:"#dc4444",gold:"#c8a84a",hdr:"#8ab0d0"};
var INP={background:C.bg,color:C.text,border:"1px solid "+C.accent,borderRadius:"3px",
  padding:"3px 5px",width:"62px",fontSize:"11px",textAlign:"right",
  fontFamily:"'Courier New',monospace",outline:"none"};
var HST={padding:"8px 12px",background:"#080f18",color:C.hdr,fontSize:"11px",
  fontWeight:"bold",letterSpacing:"1px",borderBottom:"1px solid "+C.border,
  textTransform:"uppercase",marginBottom:"2px"};
var BTN={cursor:"pointer",fontFamily:"'Courier New',monospace",fontSize:"11px",border:"none"};

// ═══════════════════════════════════════════
// APP
// ═══════════════════════════════════════════
function App(){
  var today=new Date();
  var r1=useState(today.getMonth()); var selM=r1[0]; var setSelM=r1[1];
  var r2=useState(2026);             var selY=r2[0]; var setSelY=r2[1];
  var r3=useState("entry");          var tab=r3[0];  var setTab=r3[1];
  var r4=useState("info");           var stmtId=r4[0]; var setStmtId=r4[1];
  var r5=useState("ws_arms");        var selCat=r5[0]; var setSelCat=r5[1];
  var r6=useState(loadAll);          var allData=r6[0]; var setAllData=r6[1];

  var mk=getMK(selM,selY);
  var prevMk=selM===0?(selY-1)+"-12":selY+"-"+("0"+selM).slice(-2);
  var md=allData[mk]||{};
  var pmd=allData[prevMk]||{};

  function getOB(catId,yr){
    var pydObj=pmd[catId]; var pyd=pydObj&&pydObj[yr];
    if(pyd){var vals=Object.values(pyd);if(vals.some(function(v){return v!==""&&v!==undefined;})){
      var p=pmd["ob_"+catId]; return clN(N(p?p[yr]:0),pyd);}}
    var o=md["ob_"+catId]; return N(o?o[yr]:0);
  }
  function getYD(catId,yr){var c=md[catId];return (c&&c[yr])?c[yr]:mkYD();}

  function upd(newMd){var d=merge(allData);d[mk]=newMd;setAllData(d);saveAll(d);}
  function setOB(catId,yr,val){var ob=merge(md["ob_"+catId]||{});ob[yr]=val;var nm=merge(md);nm["ob_"+catId]=ob;upd(nm);}
  function setYD(catId,yr,field,val){
    var cur=merge((md[catId]&&md[catId][yr])?md[catId][yr]:mkYD()); cur[field]=val;
    var ca=merge(md[catId]||{}); ca[yr]=cur; var nm=merge(md); nm[catId]=ca; upd(nm);
  }
  function setM(key,val){var nm=merge(md);nm["_m_"+key]=val;upd(nm);}
  function getM(key,def){var v=md["_m_"+key];return (v!==undefined&&v!==null)?v:(def||"0");}
  function removeYear(catId,yr){
    var ob=merge(md["ob_"+catId]||{}); delete ob[yr];
    var ca=merge(md[catId]||{}); delete ca[yr];
    var nm=merge(md); nm["ob_"+catId]=ob; nm[catId]=ca; upd(nm);
  }

  function sumFY(cids,f,yr){return cids.reduce(function(t,c){return t+N(getYD(c,yr)[f]);},0);}
  function sumFsY(cids,fs,yr){return cids.reduce(function(t,c){var yd=getYD(c,yr);return t+fs.reduce(function(s,f2){return s+N(yd[f2]);},0);},0);}
  function sumOBY(cids,yr){return cids.reduce(function(t,c){return t+getOB(c,yr);},0);}
  function sumClY(cids,yr){return cids.reduce(function(t,c){return t+clN(getOB(c,yr),getYD(c,yr));},0);}
  function sumF(cids,f){return YEARS.reduce(function(t,yr){return t+sumFY(cids,f,yr);},0);}
  function sumFs(cids,fs){return YEARS.reduce(function(t,yr){return t+sumFsY(cids,fs,yr);},0);}
  function sumOB(cids){return YEARS.reduce(function(t,yr){return t+sumOBY(cids,yr);},0);}
  function sumCl(cids){return YEARS.reduce(function(t,yr){return t+sumClY(cids,yr);},0);}
  function sumFYrs(cids,f,yrs){return yrs.reduce(function(t,yr){return t+sumFY(cids,f,yr);},0);}
  function sumFsYrs(cids,fs,yrs){return yrs.reduce(function(t,yr){return t+sumFsY(cids,fs,yr);},0);}
  function sumOBYrs(cids,yrs){return yrs.reduce(function(t,yr){return t+sumOBY(cids,yr);},0);}
  function sumClYrs(cids,yrs){return yrs.reduce(function(t,yr){return t+sumClY(cids,yr);},0);}

  var hasData=IDS.some(function(c){return Object.keys(md[c]||{}).length>0||Object.keys(md["ob_"+c]||{}).length>0;});
  var monthLabel=MONTHS[selM]+" "+selY;

  function getCatYears(catId){
    var s={};
    [md[catId]||{},md["ob_"+catId]||{},pmd[catId]||{},pmd["ob_"+catId]||{}].forEach(function(obj){
      Object.keys(obj).forEach(function(k){var n=Number(k);if(!isNaN(n))s[n]=1;});
    });
    return Object.keys(s).map(Number).sort(function(a,b){return a-b;});
  }

  function exportXLSX(){
    try{
      var wb=XLSX.utils.book_new();
      function addS(name,rows){var ws=XLSX.utils.aoa_to_sheet(rows);
        try{XLSX.utils.book_append_sheet(wb,ws,name.substring(0,31));}catch(ex){}}
      var nonFr=IDS.filter(function(i){return FR_IDS.indexOf(i)<0;});
      var cOB=sumOB(IDS),cID=sumF(IDS,"id"),cIT=sumF(IDS,"it");
      var cD=sumFs(IDS,["dc","dnc","dcm"]),cDT=sumF(IDS,"dt"),cCl=sumCl(IDS);
      var frP5=sumOBYrs(FR_IDS,YEARS.filter(function(y){return y<=selY-5;}));
      var nfrP5=sumOBYrs(nonFr,YEARS.filter(function(y){return y<=selY-5;}));
      var pOB=sumOB(PETTY_IDS),pI=sumF(PETTY_IDS,"id")+sumF(PETTY_IDS,"it"),pD=sumFs(PETTY_IDS,["dc","dnc"]);
      var mvOB=sumOB(["mv_act"]),mvI=sumF(["mv_act"],"id")+sumF(["mv_act"],"it"),mvD=sumFs(["mv_act"],["dc","dnc"]);
      var niAOB=sumOB(["ni_act"]),niAI=sumF(["ni_act"],"id")+sumF(["ni_act"],"it"),niAD=sumFs(["ni_act"],["dc","dnc"]);
      var dYrs=YEARS.slice(-12),buYrs=YEARS.slice(-15),ndYrs=YEARS.filter(function(y){return y>=2001;});
      var mpC=["ws_mpmla"],shC=["ws_cr_rape","ws_sh"];

      addS("Information",[["Court Statement - "+monthLabel+" - ACJM Baghpat"],[],
        ["Nature","Opening","Inst.Direct","Inst.Transfer","Disposal","Disp.Transfer","Closing"],
        ["Criminal",cOB,cID,cIT,cD,cDT,cCl],["Civil","-","-","-","-","-","-"],["Total",cOB,cID,cIT,cD,cDT,cCl]]);

      addS("Pendency Arrears",[["Pendency Arrears - "+monthLabel],[],
        ["Category","Opening","Inst.Direct","Inst.Transfer","Disp.Actual","Disp.Transfer","Closing","5yr+ Pendency"],
        ["Excl. Pre-Trial",sumOB(nonFr),sumF(nonFr,"id"),sumF(nonFr,"it"),sumFs(nonFr,["dc","dnc","dcm"]),sumF(nonFr,"dt"),sumCl(nonFr),nfrP5],
        ["Pre-Trial (FR)",sumOB(FR_IDS),sumF(FR_IDS,"id")+sumF(FR_IDS,"it"),0,sumFs(FR_IDS,["dc","dnc","dcm"]),sumF(FR_IDS,"dt"),sumCl(FR_IDS),frP5],
        ["Total",cOB,cID,cIT,cD,cDT,cCl,nfrP5+frP5]]);

      addS("Breakup",[["Breakup - "+monthLabel],[],
        ["Nature"].concat(buYrs).concat(["Total"]),
        ["1.Warrant Trial"].concat(buYrs.map(function(yr){return sumClY(BU.warrant,yr);})).concat([sumCl(BU.warrant)]),
        ["2.Summons Trial"].concat(buYrs.map(function(yr){return sumClY(BU.summons,yr);})).concat([sumCl(BU.summons)]),
        ["3.Summary"].concat(buYrs.map(function(yr){return sumClY(BU.summary,yr);})).concat([sumCl(BU.summary)]),
        ["4.Petty"].concat(buYrs.map(function(yr){return sumClY(BU.petty,yr);})).concat([sumCl(BU.petty)]),
        ["5.DV Act"].concat(buYrs.map(function(){return 0;})).concat([0]),
        ["6.FR"].concat(buYrs.map(function(yr){return sumClY(BU.fr,yr);})).concat([sumCl(BU.fr)]),
        ["7.CMC"].concat(buYrs.map(function(yr){return sumClY(BU.misc_cmc,yr);})).concat([sumCl(BU.misc_cmc)]),
        ["8.173 BNSS"].concat(buYrs.map(function(yr){return sumClY(BU.misc_173,yr);})).concat([sumCl(BU.misc_173)]),
        ["9.Bail"].concat(buYrs.map(function(yr){return sumClY(BU.misc_bail,yr);})).concat([sumCl(BU.misc_bail)]),
        ["Total"].concat(buYrs.map(function(yr){return sumClY(IDS,yr);})).concat([sumCl(IDS)])]);

      var trCats=IDS.filter(function(i){return MISC_IDS.indexOf(i)<0&&FR_IDS.indexOf(i)<0;});
      var mcCats=FR_IDS.concat(MISC_IDS);
      function cnS(cats){var rows=[];
        [["Opening",function(c,yr){return sumOBY(c,yr);}],
         ["Inst.Direct",function(c,yr){return sumFY(c,"id",yr);}],
         ["Inst.Transfer",function(c,yr){return sumFY(c,"it",yr);}],
         ["Disp.Contested",function(c,yr){return sumFY(c,"dc",yr);}],
         ["Disp.Non-Contested",function(c,yr){return sumFY(c,"dnc",yr);}],
         ["Disp.Committal",function(c,yr){return sumFY(c,"dcm",yr);}],
         ["Disp.Transfer",function(c,yr){return sumFY(c,"dt",yr);}],
         ["Closing",function(c,yr){return sumClY(c,yr);}]
        ].forEach(function(rd){rows.push([rd[0]].concat(dYrs.map(function(yr){return rd[1](cats,yr);})).concat([dYrs.reduce(function(t,yr){return t+rd[1](cats,yr);},0)]));});
        return rows;}
      var cnH=["Type"].concat(dYrs).concat(["Total"]);
      addS("Contested NC",[["Contested NC - "+monthLabel],[],["-- Trial Cases --"],[cnH]].concat(cnS(trCats)).concat([[],["-- Misc Cases --"],[cnH]]).concat(cnS(mcCats)).concat([[],
        ["ACTUAL DISPOSAL"],["Contested",sumFs(IDS,["dc"])],["Non-Contested",sumFs(IDS,["dnc"])],
        ["Committal",sumFs(IDS,["dcm"])],["Total",sumFs(IDS,["dc","dnc","dcm"])]]));

      addS("Apar DJ",[["Apar DJ - "+monthLabel],[],
        ["Slab","Years","Opening","Inst.Transfer","Actual Disposal","Disp.Transfer","Closing"]].concat(
        APAR_SLABS.map(function(s){return [s.lbl,s.yrRange,sumOBYrs(TRIAL_IDS,s.yrs),
          sumFYrs(TRIAL_IDS,"it",s.yrs),sumFsYrs(TRIAL_IDS,["dc","dnc","dcm"],s.yrs),
          sumFYrs(TRIAL_IDS,"dt",s.yrs),sumClYrs(TRIAL_IDS,s.yrs)];})));

      addS("Rape MP MLA",[["Rape MP MLA - "+monthLabel],[],
        ["Category","Opening","Inst.Direct","Inst.Transfer","Disposal","Disp.Transfer","Closing"],
        ["MP/MLA (ACJM)",sumOB(mpC),sumF(mpC,"id"),sumF(mpC,"it"),sumFs(mpC,["dc","dnc","dcm"]),sumF(mpC,"dt"),sumCl(mpC)],
        ["Rape/SH (ACJM)",sumOB(shC),sumF(shC,"id"),sumF(shC,"it"),sumFs(shC,["dc","dnc","dcm"]),sumF(shC,"dt"),sumCl(shC)],
        ["Sessions MP/MLA",N(getM("ses_mp_ob")),N(getM("ses_mp_id")),N(getM("ses_mp_it")),N(getM("ses_mp_d")),N(getM("ses_mp_dt")),N(getM("ses_mp_ob"))+N(getM("ses_mp_id"))+N(getM("ses_mp_it"))-N(getM("ses_mp_d"))-N(getM("ses_mp_dt"))],
        ["Sessions POCSO",N(getM("ses_pocso_ob")),N(getM("ses_pocso_id")),N(getM("ses_pocso_it")),N(getM("ses_pocso_d")),N(getM("ses_pocso_dt")),N(getM("ses_pocso_ob"))+N(getM("ses_pocso_id"))+N(getM("ses_pocso_it"))-N(getM("ses_pocso_d"))-N(getM("ses_pocso_dt"))]]);

      addS("NDPS",[["NDPS - "+monthLabel],[],["Type"].concat(ndYrs).concat(["Total"]),
        ["Opening"].concat(ndYrs.map(function(yr){return getOB("ws_ndps",yr);})).concat([sumOBYrs(["ws_ndps"],ndYrs)]),
        ["Institution"].concat(ndYrs.map(function(yr){var yd=getYD("ws_ndps",yr);return N(yd.id)+N(yd.it);})).concat([sumF(["ws_ndps"],"id")+sumF(["ws_ndps"],"it")]),
        ["Disposal"].concat(ndYrs.map(function(yr){return dispT(getYD("ws_ndps",yr));})).concat([sumFs(["ws_ndps"],["dc","dnc","dcm","dt"])]),
        ["Closing"].concat(ndYrs.map(function(yr){return sumClY(["ws_ndps"],yr);})).concat([sumCl(["ws_ndps"])])]);

      addS("Petty NI",[["Petty NI - "+monthLabel],[],
        ["Nature","Opening","Institution","Disposal","Closing"],
        ["Traffic Challan",mvOB,mvI,mvD,sumCl(["mv_act"])],
        ["Municipal Challan",N(getM("mun_ob")),N(getM("mun_i")),N(getM("mun_d")),N(getM("mun_ob"))+N(getM("mun_i"))-N(getM("mun_d"))],
        ["NI Act 138",niAOB,niAI,niAD,sumCl(["ni_act"])]]);

      var tCl=sumCl(IDS),pCl=sumCl(PETTY_IDS);
      addS("Petty Non-Petty",[["Proforma A - "+monthLabel],[],["Court","Total","Petty","Non-Petty"],["ACJM Baghpat",tCl,pCl,tCl-pCl]]);
      addS("Monthly Petty",[["Proforma C - "+monthLabel],[],["Opening","Institution","Disposal","Fine (Rs.)","Closing"],[pOB,pI,pD,N(getM("petty_fine")),pOB+pI-pD]]);

      var rpC=["ws_cr_rape","ws_sh"],cmC=["ws_cr_rape","ws_cr_oth"];
      var s3K=["s3_women","s3_juv","s3_disabled","s3_senior","s3_utp6m","s3_utp2y","s3_jail3y","s3_commit","s3_stayed"];
      var s3L={s3_women:"Women cases",s3_juv:"Juvenile",s3_disabled:"Differently abled",s3_senior:"Senior citizens",s3_utp6m:"UTP >6 months",s3_utp2y:"UTP >2 years",s3_jail3y:"Accused >3 yrs",s3_commit:"Pending committal",s3_stayed:"Cases stayed"};
      addS("S3 Special",[["S3 Special - "+monthLabel],[],
        ["Nature","Opening","Institution","Decided","Otherwise","Closing"],
        ["Rape/SH",sumOB(rpC),sumF(rpC,"id"),sumFs(rpC,["dc","dnc"]),"-",sumCl(rpC)],
        ["Committal",sumOB(cmC),sumF(cmC,"id"),sumFs(cmC,["dc","dnc"]),"-",sumCl(cmC)],
        ["Traffic",mvOB,mvI,mvD,"-",sumCl(["mv_act"])],
        ["NI Act",niAOB,niAI,niAD,"-",sumCl(["ni_act"])]].concat(s3K.map(function(k){
        var ob=N(getM(k+"_ob")),ins=N(getM(k+"_i")),dec=N(getM(k+"_d")),oth=N(getM(k+"_o"));
        return [s3L[k],ob,ins,dec,oth,ob+ins-dec-oth];})));

      var niByrs=YEARS.filter(function(y){return y>=2010;});
      addS("NI Breakup",[["NI Breakup - "+monthLabel],[],
        ["","Opening","Institution","Disposal","Closing"],["NI Act 138",niAOB,niAI,niAD,sumCl(["ni_act"])],[],
        ["Stage-wise"],["Appearance",N(getM("ni_appear"))],["Hearing",N(getM("ni_hearing"))],["Final",N(getM("ni_final"))],[],
        ["Year-wise Closing"],["Year"].concat(niByrs).concat(["Total"]),
        ["Closing"].concat(niByrs.map(function(yr){return sumClY(["ni_act"],yr);})).concat([sumCl(["ni_act"])])]);

      XLSX.writeFile(wb,"CourtStatements_"+MONTHS[selM]+selY+"_ACJM.xlsx");
    }catch(ex){alert("Export error: "+ex.message);}
  }

  var SR={selM:selM,selY:selY,getOB:getOB,getYD:getYD,sumF:sumF,sumFs:sumFs,sumOB:sumOB,sumCl:sumCl,
    sumFY:sumFY,sumFsY:sumFsY,sumOBY:sumOBY,sumClY:sumClY,
    sumFYrs:sumFYrs,sumFsYrs:sumFsYrs,sumOBYrs:sumOBYrs,sumClYrs:sumClYrs,
    setM:setM,getM:getM,monthLabel:monthLabel};

  var id=p.id,monthLabel=p.monthLabel,selM=p.selM,selY=p.selY;
  var getOB=p.getOB,getYD=p.getYD,sumF=p.sumF,sumFs=p.sumFs,sumOB=p.sumOB,sumCl=p.sumCl;
  var sumFY=p.sumFY,sumFsY=p.sumFsY,sumOBY=p.sumOBY,sumClY=p.sumClY;

  var setM=p.setM,getM=p.getM;

  function Hdr(t){return e("div",{style:HST},t+" — "+monthLabel);}

      vals.map(function(v,i){return e("td",{key:i,style:{padding:"5px 8px",textAlign:"center",
        color:grn?C.greenT:bold?C.hdr:C.text,fontWeight:bold?"bold":"normal",
        borderBottom:"1px solid "+C.border,fontSize:"11px"}},dv(v));})
    );}
  function Fi(fkey,def){
    return e("input",{value:getM(fkey,def||"0"),onChange:function(ev){setM(fkey,ev.target.value);},
      style:merge(INP,{background:"#080d14",borderColor:"#1a4a6a"}),type:"number",min:"0"});}

  var nonFr=IDS.filter(function(i){return FR_IDS.indexOf(i)<0;});
  var cOB=sumOB(IDS),cID=sumF(IDS,"id"),cIT=sumF(IDS,"it");
  var cD=sumFs(IDS,["dc","dnc","dcm"]),cDT=sumF(IDS,"dt"),cCl=sumCl(IDS);
  var frOB=sumOB(FR_IDS),frI=sumF(FR_IDS,"id")+sumF(FR_IDS,"it");
  var frD=sumFs(FR_IDS,["dc","dnc","dcm"]),frDT=sumF(FR_IDS,"dt"),frCl=sumCl(FR_IDS);

  // INFORMATION
  if(id==="info") return e("div",null,Hdr("Information"),
    Wrap(e("table",{style:{width:"100%",borderCollapse:"collapse"}},
      Th(["Nature","Opening","Inst.Direct","Inst.Transfer","Disposal(Actual)","Disp.Transfer","Closing"]),
      e("tbody",null,
        Tr("Criminal Cases",[cOB,cID||"-",cIT||"-",cD||"-",cDT||"-",cCl],true,false,true),
        Tr("Civil Cases",["-","-","-","-","-","-"]),
        Tr("Total",[cOB,cID||"-",cIT||"-",cD||"-",cDT||"-",cCl],false,true)))));

  // PENDENCY
  if(id==="pendency"){
    var frP5=sumOBYrs(FR_IDS,YEARS.filter(function(y){return y<=selY-5;}));
    var nfrP5=sumOBYrs(nonFr,YEARS.filter(function(y){return y<=selY-5;}));
    var nfrOB=sumOB(nonFr),nfrID=sumF(nonFr,"id"),nfrIT=sumF(nonFr,"it");
    var nfrD=sumFs(nonFr,["dc","dnc","dcm"]),nfrDT=sumF(nonFr,"dt"),nfrCl=sumCl(nonFr);
    var pRows=[["Pendency (Excl. Pre-Trial / FR)",[nfrOB,nfrID,nfrIT,nfrD,nfrDT,nfrCl,"-",nfrP5]],
               ["Pre-Trial (FR only)",[frOB,frI,0,frD,frDT,frCl,"-",frP5]],
               ["Grand Total",[cOB,cID,cIT,cD,cDT,cCl,"-",nfrP5+frP5]]];
    var pHdrs=["Opening","Inst.Direct","Inst.Transfer","Disp.Actual","Disp.Transfer","Closing","% Change","5yr+ Pendency"];
    return e("div",null,Hdr("Pendency / Arrears"),Wrap(e("table",{style:{width:"100%",borderCollapse:"collapse"}},
      e("thead",null,e("tr",null,
        e("th",{style:{padding:"6px 8px",background:"#090f18",color:C.hdr,textAlign:"left",borderBottom:"1px solid "+C.border,minWidth:"200px"}},"Category"),
        pHdrs.map(function(h,i){return e("th",{key:i,style:{padding:"5px 8px",background:"#090f18",color:C.hdr,fontSize:"10px",textAlign:"center",borderBottom:"1px solid "+C.border}},h);})

            borderBottom:"1px solid "+C.border,fontSize:"11px"}},dv(v));}));
      }))
    )));
  }

  // BREAKUP
  if(id==="breakup"){
    var bYrs=YEARS.slice(-15);
    var buRows=[
      {lbl:"1. Warrant Trial (W/S State+Compl)",cats:BU.warrant},
      {lbl:"2. Summons Trial (State+Compl)",cats:BU.summons},
      {lbl:"3. Summary (W/M Challan)",cats:BU.summary},

          e("th",{style:{padding:"6px 8px",background:"#090f18",color:C.hdr,textAlign:"left",borderBottom:"1px solid "+C.border,minWidth:"225px",position:"sticky",left:0}},"Nature of Case"),

              bYrs.map(function(yr){var v=sumClY(row.cats,yr);return e("td",{key:yr,style:{padding:"3px",textAlign:"center",color:v>0?C.text:C.border,borderBottom:"1px solid "+C.border}},v||"");}),
              e("td",{style:{padding:"5px 6px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border}},tot||"")

            e("td",{style:{padding:"5px 6px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border}},sumCl(IDS)||"")
          )
        )
      )
    ));
  }

  // CONTESTED/NC
  if(id==="contested"){
    var trCats=IDS.filter(function(i){return MISC_IDS.indexOf(i)<0&&FR_IDS.indexOf(i)<0;});
    var mcCats=FR_IDS.concat(MISC_IDS);
    var dYrs=YEARS.slice(-12);

  // APAR DJ
  if(id==="apar") return e("div",null,Hdr("Apar DJ — Old Cases"),

        Th(["Nature","Opening","Institution","Disposal","Closing"]),

  // S3 SPECIAL
  if(id==="s3"){
    var rpC=["ws_cr_rape","ws_sh"],cmC=["ws_cr_rape","ws_cr_oth"];
    var mvS={ob:sumOB(["mv_act"]),i:sumF(["mv_act"],"id")+sumF(["mv_act"],"it"),d:sumFs(["mv_act"],["dc","dnc"])};
    var niS={ob:sumOB(["ni_act"]),i:sumF(["ni_act"],"id")+sumF(["ni_act"],"it"),d:sumFs(["ni_act"],["dc","dnc"])};
    var mRows=[
      {key:"s3_women",lbl:"Cases related to women"},{key:"s3_juv",lbl:"Juvenile cases"},
      {key:"s3_disabled",lbl:"Differently abled"},{key:"s3_senior",lbl:"Senior citizens"},

          mRows.map(function(r){

                r.lbl," ",e("span",{style:{fontSize:"8px",color:C.border}},"(manual)")),

              e("td",{style:{padding:"5px 8px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border}},ob+ins-dec-oth));

    var matched=stTot===niCl;

      Wrap(e("table",{style:{width:"100%",borderCollapse:"collapse",marginBottom:"10px"}},
        Th(["","Opening","Institution","Disposal","Closing"]),
        e("tbody",null,Tr("NI Act Sec.138 — ACJM Baghpat",[niOB,niI||"-",niD||"-",niCl],true,false,true))

      e("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:"4px",padding:"10px",marginBottom:"10px"}},
        e("div",{style:{fontSize:"10px",color:C.hdr,marginBottom:"8px",fontWeight:"bold"}},"Stage-wise Pending (Manual)"),
        e("div",{style:{display:"flex",gap:"16px",flexWrap:"wrap",alignItems:"center"}},
          [["ni_appear","Appearance"],["ni_hearing","Hearing/Evidence"],["ni_final","Final Hearing"]].map(function(x){
            return e("div",{key:x[0],style:{textAlign:"center"}},
              e("div",{style:{fontSize:"9px",color:C.dim,marginBottom:"3px"}},x[1]),Fi(x[0]));
          }),
          e("div",{style:{textAlign:"center"}},
            e("div",{style:{fontSize:"9px",color:C.dim,marginBottom:"3px"}},"Stage Total"),
            e("div",{style:{fontSize:"16px",fontWeight:"bold",color:matched?C.greenT:C.redT}},stTot)),
          e("div",{style:{textAlign:"center"}},

          (!matched&&stTot>0)?e("div",{style:{fontSize:"9px",color:C.redT,padding:"4px 8px",background:"#1a0808",borderRadius:"3px"}},"⚠ Stage total mismatch"):null

      e("div",{style:{overflowX:"auto"}},
        e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"10px"}},
          e("thead",null,e("tr",null,
            niYrs.map(function(y){return e("th",{key:y,style:{padding:"4px",background:"#090f18",color:C.dim,fontSize:"9px",textAlign:"center",borderBottom:"1px solid "+C.border,minWidth:"34px"}},y);}),
            e("th",{style:{padding:"5px 6px",background:"#090f18",color:C.greenT,textAlign:"center",borderBottom:"1px solid "+C.border}},"Total")
          )),
          e("tbody",null,e("tr",{style:{background:"#090f18"}},
            niYrs.map(function(yr){var v=clN(getOB("ni_act",yr),getYD("ni_act",yr));
              return e("td",{key:yr,style:{padding:"4px",textAlign:"center",color:v>0?C.text:C.border,borderBottom:"1px solid "+C.border}},v||"");}),
            e("td",{style:{padding:"4px 6px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border}},niCl)
          ))
        )
      )
    );
  }

  return e("div",{style:{color:C.dim,padding:"20px"}},"Statement not found.");
}

</script>
