<script>
"use strict";
var e=React.createElement, useState=React.useState;

// ══════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════
var MONTHS=["January","February","March","April","May","June",
            "July","August","September","October","November","December"];
var YEARS=(function(){var a=[];for(var i=0;i<36;i++)a.push(1993+i);return a;})();

// Groups and their case types (exactly as in Excel)
var GROUPS=[
  {id:"wss",lbl:"W/S State",col:"#1a3a5c",
   types:[{id:"ipc",lbl:"IPC"},{id:"arms",lbl:"ARMS"},{id:"ex",lbl:"EX"},
          {id:"mpmla",lbl:"MP/MLA"},{id:"ndps",lbl:"NDPS"},{id:"ec",lbl:"3/7EC"},
          {id:"coth",lbl:"Cmtl.Oth"},{id:"crape",lbl:"Cmtl.Rape"},{id:"sh",lbl:"Sex.Har"},
          {id:"wso",lbl:"Other WS"}]},
  {id:"wsc",lbl:"W/S Complaint",col:"#2a3a6c",
   types:[{id:"wco",lbl:"W/S Compl"}]},
  {id:"sms",lbl:"Summons State",col:"#0d3a20",
   types:[{id:"s716",lbl:"7/16 OF"},{id:"fss",lbl:"FSS"},{id:"sso",lbl:"Other"}]},
  {id:"smc",lbl:"Summons Compl",col:"#1a3a2c",
   types:[{id:"ni",lbl:"NI Act 138"},{id:"sco",lbl:"Oth.Compl"}]},
  {id:"pet",lbl:"Petty/Challan",col:"#3a2a0a",
   types:[{id:"mv",lbl:"MV Act"},{id:"och",lbl:"Oth.Challan"},{id:"wm",lbl:"W/M Challan"}]},
  {id:"fr", lbl:"Final Report",col:"#3a0a0a",
   types:[{id:"fr",lbl:"FR"}]},
  {id:"cmc",lbl:"Criminal Misc",col:"#2a0a3a",
   types:[{id:"cmc",lbl:"CMC"},{id:"b173",lbl:"173 BNSS"},{id:"bail",lbl:"Bail"}]},
];

var ALL_PAIRS=[];
GROUPS.forEach(function(g){g.types.forEach(function(t){ALL_PAIRS.push([g.id,t.id]);});});
var P_FR   =[["fr","fr"]];
var P_PETTY=[["pet","mv"],["pet","och"],["pet","wm"]];
var P_MISC =[["cmc","cmc"],["cmc","b173"],["cmc","bail"]];
var P_TRIAL=ALL_PAIRS.filter(function(p){return p[0]!=="cmc";});
var P_NONFR=ALL_PAIRS.filter(function(p){return !(p[0]==="fr"&&p[1]==="fr");});

var BU_ROWS=[
  {lbl:"1. Criminal Warrant Trial Cases (W/S State & Complaint)",
   pairs:ALL_PAIRS.filter(function(p){return p[0]==="wss"||p[0]==="wsc";})},
  {lbl:"2. Criminal Summon Trial Cases (State & Complaint)",
   pairs:ALL_PAIRS.filter(function(p){return p[0]==="sms"||p[0]==="smc";})},
  {lbl:"3. Criminal Summary Trial (W/M Challan)",pairs:[["pet","wm"]]},
  {lbl:"4. Petty Offences (MV Act + Other Challan)",pairs:[["pet","mv"],["pet","och"]]},
  {lbl:"5. Cases under DV Act 2005",pairs:[]},
  {lbl:"6. Final Reports",pairs:[["fr","fr"]]},
  {lbl:"7. Criminal Misc Cases (CMC excl.173 & Bail)",pairs:[["cmc","cmc"]]},
  {lbl:"8. Applications u/s 173 BNSS",pairs:[["cmc","b173"]]},
  {lbl:"9. Bail Applications",pairs:[["cmc","bail"]]},
];

var APAR_SLABS=[
  {lbl:"5-10 years", yr:"2014-2019",yrs:YEARS.filter(function(y){return y>=2014&&y<=2019;})},
  {lbl:"10-20 years",yr:"2005-2013",yrs:YEARS.filter(function(y){return y>=2005&&y<=2013;})},
  {lbl:"20-30 years",yr:"1994-2004",yrs:YEARS.filter(function(y){return y>=1994&&y<=2004;})},
];

var STMTS=[
  {id:"info",lbl:"Information"},{id:"pendency",lbl:"Pendency/Arrears"},
  {id:"breakup",lbl:"Breakup"},{id:"contested",lbl:"Contested/NC"},
  {id:"apar",lbl:"Apar DJ"},{id:"rape_mla",lbl:"Rape/MP-MLA"},
  {id:"ndps",lbl:"NDPS"},{id:"petty_ni",lbl:"Petty & NI"},
  {id:"petty_np",lbl:"Petty/Non-Petty"},{id:"mthly_petty",lbl:"Monthly Petty"},
  {id:"s3",lbl:"S3 Special"},{id:"ni_breakup",lbl:"NI Breakup"},
];

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
var SKEY="csm_v8";
function N(v){return Number(v)||0;}
function ow(){var r={};for(var i=0;i<arguments.length;i++){var o=arguments[i]||{};for(var k in o)if(Object.prototype.hasOwnProperty.call(o,k))r[k]=o[k];}return r;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function getMK(m,y){return y+"-"+("0"+(m+1)).slice(-2);}
function loadAll(){try{return JSON.parse(localStorage.getItem(SKEY))||{};}catch(x){return{};}}
function saveAll(d){try{localStorage.setItem(SKEY,JSON.stringify(d));}catch(x){}}
function dv(v){return (v===0||v===null||v===undefined||v==="") ? "-" : v;}
function monthStr(m,y){return MONTHS[m]+" "+y;}
function lastDay(m,y){return new Date(y,m+1,0).getDate();}
function dateStr(m,y){return ("0"+lastDay(m,y)).slice(-2)+"."+("0"+(m+1)).slice(-2)+"."+y;}

// Entry CRUD — pure, return new allData
function getEntries(allData,mk){return (allData[mk]||{}).entries||[];}
function getPrevEntries(allData,prevMk){return (allData[prevMk]||{}).entries||[];}
function getManual(allData,mk,key,def){var v=((allData[mk]||{}).manual||{})[key];return (v!==undefined&&v!==null)?v:(def||"0");}

function setEntry(allData,mk,entry){
  var mk_data=ow(allData[mk]||{});
  var entries=(mk_data.entries||[]).slice();
  var idx=-1;
  for(var i=0;i<entries.length;i++){if(entries[i].id===entry.id){idx=i;break;}}
  if(idx>=0) entries[idx]=ow(entry);
  else entries.push(ow(entry));
  mk_data.entries=entries;
  var nd=ow(allData); nd[mk]=mk_data;
  return nd;
}
function deleteEntry(allData,mk,id){
  var mk_data=ow(allData[mk]||{});
  mk_data.entries=(mk_data.entries||[]).filter(function(en){return en.id!==id;});
  var nd=ow(allData); nd[mk]=mk_data;
  return nd;
}
function setManual(allData,mk,key,val){
  var mk_data=ow(allData[mk]||{});
  mk_data.manual=ow(mk_data.manual||{});
  mk_data.manual[key]=val;
  var nd=ow(allData); nd[mk]=mk_data;
  return nd;
}

// ── Aggregate helpers — all PURE, take entries as param ──
function entryOB(en,prevEntries){
  // OB: if manually set on entry, use it. Otherwise compute from prev month.
  if(en.ob!=="" && en.ob!==undefined) return N(en.ob);
  // Find matching entries in prev month
  var prevMatch=prevEntries.filter(function(pe){return pe.gid===en.gid&&pe.tid===en.tid&&pe.yr===en.yr;});
  if(prevMatch.length===0) return 0;
  var prevOB=0;
  prevMatch.forEach(function(pe){prevOB+=entryOBSimple(pe);});
  var prevInst=0,prevDisp=0;
  prevMatch.forEach(function(pe){prevInst+=N(pe.inst)+N(pe.itrf); prevDisp+=N(pe.dc)+N(pe.dn)+N(pe.dm)+N(pe.dt);});
  return prevOB+prevInst-prevDisp;
}
function entryOBSimple(en){return N(en.ob);}
function entryCl(en,prevEntries){
  var ob=entryOB(en,prevEntries);
  return ob+N(en.inst)+N(en.itrf)-N(en.dc)-N(en.dn)-N(en.dm)-N(en.dt);
}

// Sum a field over entries matching pairs, optionally filtered by years
function sumF(entries,prevEntries,pairs,field,yrs){
  return entries.reduce(function(t,en){
    if(!matchPairs(en,pairs)) return t;
    if(yrs && yrs.indexOf(en.yr)<0) return t;
    if(field==="ob") return t+entryOB(en,prevEntries);
    if(field==="cl") return t+entryCl(en,prevEntries);
    return t+N(en[field]);
  },0);
}
function sumFs(entries,prevEntries,pairs,fields,yrs){
  return fields.reduce(function(s,f){return s+sumF(entries,prevEntries,pairs,f,yrs);},0);
}
function matchPairs(en,pairs){
  for(var i=0;i<pairs.length;i++){if(pairs[i][0]===en.gid&&pairs[i][1]===en.tid)return true;}
  return false;
}
// Sum closing by specific year for breakup
function sumClY(entries,prevEntries,pairs,yr){
  return entries.reduce(function(t,en){
    if(!matchPairs(en,pairs)) return t;
    if(en.yr!==yr) return t;
    return t+entryCl(en,prevEntries);
  },0);
}

// ══════════════════════════════════════
// STYLES
// ══════════════════════════════════════
var C={bg:"#070d16",panel:"#0c1620",card:"#101c2a",border:"#162636",
  accent:"#1e4a7a",text:"#b8cce0",dim:"#3a5a78",
  greenT:"#4adc8a",redT:"#dc4444",gold:"#c8a84a",hdr:"#8ab0d0"};
function inp(ex){return ow({background:C.bg,color:C.text,border:"1px solid "+C.accent,
  borderRadius:"3px",padding:"4px 6px",fontSize:"11px",fontFamily:"'Courier New',monospace",outline:"none"},ex||{});}
var BTN={cursor:"pointer",fontFamily:"'Courier New',monospace",border:"none",outline:"none"};

// ══════════════════════════════════════
// APP
// ══════════════════════════════════════
function App(){
  var today=new Date();
  var s1=useState(today.getMonth()); var selM=s1[0]; var setSelM=s1[1];
  var s2=useState(2026);             var selY=s2[0]; var setSelY=s2[1];
  var s3=useState("entry");          var tab=s3[0];  var setTab=s3[1];
  var s4=useState("wss");            var grpId=s4[0];var setGrpId=s4[1];
  var s5=useState("info");           var sid=s5[0];  var setSid=s5[1];
  var s6=useState(loadAll);          var all=s6[0];  var setAll=s6[1];

  var mk=getMK(selM,selY);
  var prevMk=selM===0?(selY-1)+"-12":selY+"-"+("0"+selM).slice(-2);
  var entries=getEntries(all,mk);
  var prevEntries=getPrevEntries(all,prevMk);
  var ml=monthStr(selM,selY);

  function updAll(nd){setAll(nd);saveAll(nd);}

  var tabBtn=function(id,lbl){
    var act=tab===id;
    return e("button",{key:id,onClick:function(){setTab(id);},
      style:{padding:"6px 15px",borderRadius:"3px 3px 0 0",cursor:"pointer",
        background:act?C.accent:"transparent",color:act?"#fff":C.dim,
        border:"1px solid "+(act?C.accent:"transparent"),
        fontFamily:"'Courier New',monospace",fontSize:"12px"}},lbl);
  };

  return e("div",{style:{fontFamily:"'Courier New',monospace",background:C.bg,minHeight:"100vh"}},
    e("div",{style:{background:"#050a10",borderBottom:"2px solid "+C.accent,padding:"8px 14px"}},
      e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"8px"}},
        e("div",null,
          e("div",{style:{fontSize:"9px",color:C.dim,letterSpacing:"2px"}},"⚖ ACJM BAGHPAT — COURT NO. 15"),
          e("div",{style:{fontSize:"15px",fontWeight:"bold",color:"#dceeff"}},"COURT STATEMENT MANAGER")
        ),
        e("div",{style:{display:"flex",gap:"6px",alignItems:"center",flexWrap:"wrap"}},
          e("select",{value:selM,onChange:function(ev){setSelM(+ev.target.value);},style:inp({width:"104px"})},
            MONTHS.map(function(m,i){return e("option",{key:i,value:i},m);})),
          e("select",{value:selY,onChange:function(ev){setSelY(+ev.target.value);},style:inp({width:"70px"})},
            [2024,2025,2026,2027,2028].map(function(y){return e("option",{key:y,value:y},y);})),
          tab==="stmts"?e("button",{
            onClick:function(){doExport(all,mk,prevMk,selM,selY);},
            style:ow(BTN,{padding:"5px 12px",background:"#0a2a1a",color:C.greenT,
              border:"1px solid #2a8a4a",borderRadius:"3px",fontSize:"11px",fontWeight:"bold"})},
            "⬇ XLSX"):null
        )
      ),
      e("div",{style:{display:"flex",gap:"4px",marginTop:"8px"}},
        tabBtn("entry","📝 Data Entry"), tabBtn("stmts","📊 Statements"))
    ),
    tab==="entry"
      ?e(DataEntry,{all:all,mk:mk,prevMk:prevMk,updAll:updAll,grpId:grpId,setGrpId:setGrpId,ml:ml})
      :e(StmtsPanel,{all:all,mk:mk,prevMk:prevMk,updAll:updAll,sid:sid,setSid:setSid,selM:selM,selY:selY,ml:ml})
  );
}

// ══════════════════════════════════════
// DATA ENTRY
// ══════════════════════════════════════
function DataEntry(p){
  var all=p.all,mk=p.mk,prevMk=p.prevMk,updAll=p.updAll;
  var grpId=p.grpId,setGrpId=p.setGrpId,ml=p.ml;
  var entries=getEntries(all,mk);
  var prevEntries=getPrevEntries(all,prevMk);

  var grp=null;
  for(var i=0;i<GROUPS.length;i++){if(GROUPS[i].id===grpId){grp=GROUPS[i];break;}}
  if(!grp)grp=GROUPS[0];

  // Entries for this group
  var grpEntries=entries.filter(function(en){return en.gid===grpId;});

  function addRow(){
    var newEn={id:uid(),gid:grpId,tid:grp.types[0].id,yr:2026,ob:"",
      inst:"",itrf:"",dc:"",dn:"",dm:"",dt:""};
    updAll(setEntry(all,mk,newEn));
  }
  function delRow(id){updAll(deleteEntry(all,mk,id));}
  function updField(en,field,val){
    var neu=ow(en); neu[field]=val;
    updAll(setEntry(all,mk,neu));
  }
  function setTid(en,tid){
    var neu=ow(en); neu.tid=tid;
    updAll(setEntry(all,mk,neu));
  }

  var types=grp.types;

  // Column headers
  var flowHdrs=["OB","INST","I-TRF","CONTES","NON CONT","COMMIT","D-TRF","CLOSING"];
  var flowFlds=["ob","inst","itrf","dc","dn","dm","dt"];
  var flowColors={ob:"#1a3a5c",inst:"#0d3a20",itrf:"#0d3a20",dc:"#3a1a1a",dn:"#3a1a1a",dm:"#3a1a1a",dt:"#3a1a1a"};
  var flowHdrColors={ob:"#6ab0f0",inst:"#4aaa6a",itrf:"#4aaa6a",dc:"#cc5555",dn:"#cc5555",dm:"#cc5555",dt:"#cc5555"};

  var thS={padding:"4px 3px",background:"#080f18",color:C.hdr,fontSize:"9px",
    fontWeight:"bold",textAlign:"center",borderBottom:"1px solid "+C.border,
    borderRight:"1px solid #0e1828",whiteSpace:"nowrap"};

  return e("div",{style:{display:"flex",height:"calc(100vh - 108px)",overflow:"hidden"}},

    // SIDEBAR
    e("div",{style:{width:"125px",minWidth:"125px",overflowY:"auto",borderRight:"1px solid "+C.border,background:"#060c14"}},
      e("div",{style:{padding:"5px 8px",fontSize:"9px",color:C.dim,borderBottom:"1px solid "+C.border}},"SELECT GROUP"),
      GROUPS.map(function(g){
        var act=grpId===g.id;
        var cnt=entries.filter(function(en){return en.gid===g.id;}).length;
        return e("button",{key:g.id,onClick:function(){setGrpId(g.id);},
          style:{padding:"6px 8px",width:"100%",textAlign:"left",cursor:"pointer",
            background:act?g.col+"55":"transparent",color:act?"#dceeff":C.dim,
            border:"none",borderLeft:"3px solid "+(act?g.col:"transparent"),
            borderBottom:"1px solid "+C.border,fontFamily:"'Courier New',monospace",fontSize:"10px"}},
          e("div",{style:{fontWeight:act?"bold":"normal"}},g.lbl),
          e("div",{style:{fontSize:"8px",color:cnt?C.greenT:C.border,marginTop:"1px"}},
            cnt?" "+cnt+" entries":" no entries")
        );
      })
    ),

    // GRID
    e("div",{style:{flex:1,overflow:"auto",padding:"8px",background:C.panel}},
      e("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"8px",flexWrap:"wrap",gap:"6px"}},
        e("span",{style:{fontSize:"13px",fontWeight:"bold",color:"#dceeff",
          borderLeft:"3px solid "+grp.col,paddingLeft:"8px"}},
          grp.lbl,"  ",e("span",{style:{fontSize:"10px",color:C.dim,fontWeight:"normal"}},ml)),
        e("button",{onClick:addRow,style:ow(BTN,{padding:"5px 14px",background:"#0a2a1a",
          color:C.greenT,border:"1px solid #2a8a4a",borderRadius:"3px",fontSize:"11px"})},
          "+ Add Row")
      ),

      // Legend
      e("div",{style:{display:"flex",gap:"5px",flexWrap:"wrap",marginBottom:"6px",fontSize:"9px"}},
        [["OB","Opening Bal","#1a3a5c","#6ab0f0"],["INST","Inst.Direct","#0d3a20","#4aaa6a"],
         ["I-TRF","Inst.Transfer","#0d3a20","#4aaa6a"],["CONTES","Disp.Contested","#3a1a1a","#cc5555"],
         ["NC","Non-Contested","#3a1a1a","#cc5555"],["COMMIT","Committal","#3a1a1a","#cc5555"],
         ["D-TRF","Disp.Transfer","#3a1a1a","#cc5555"]
        ].map(function(x){return e("span",{key:x[0],style:{background:x[2],padding:"2px 5px",borderRadius:"2px",color:x[3]}},x[0]+" = "+x[1]);})
      ),

      grpEntries.length===0
        ? e("div",{style:{color:C.border,textAlign:"center",padding:"40px",border:"1px dashed "+C.border,borderRadius:"6px",fontSize:"12px"}},
            "Koi entry nahi hai. '+ Add Row' dabao.")
        : e("div",{style:{overflowX:"auto"}},
            e("table",{style:{borderCollapse:"collapse",fontSize:"10px"}},
              e("thead",null,
                // Row 1: Del | Year | [case types spanning 1 col each] | [flow fields]
                e("tr",null,
                  e("th",{style:ow(thS,{minWidth:"24px"})},""),
                  e("th",{style:ow(thS,{minWidth:"56px",background:"#0a1020",color:C.gold})},"Year"),
                  types.map(function(t){
                    return e("th",{key:t.id,style:ow(thS,{minWidth:"52px",background:grp.col+"33",color:"#dceeff"})},t.lbl);
                  }),
                  flowFlds.map(function(f,fi){
                    return e("th",{key:f,style:ow(thS,{minWidth:"56px",background:flowColors[f]+"33",color:flowHdrColors[f]})},flowHdrs[fi]);
                  }),
                  e("th",{style:ow(thS,{minWidth:"56px",background:"#0a1e30",color:C.greenT})},"CLOSING")
                )
              ),
              e("tbody",null,
                grpEntries.map(function(en,ri){
                  var ob=entryOB(en,prevEntries);
                  var cl=entryCl(en,prevEntries);
                  var bg=ri%2===0?"#070d16":"#0b1520";
                  var isAutoOb=(en.ob===""||en.ob===undefined);
                  return e("tr",{key:en.id,style:{background:bg}},
                    // Delete
                    e("td",{style:{padding:"2px",borderBottom:"1px solid "+C.border}},
                      e("button",{onClick:function(){delRow(en.id);},
                        style:{background:"transparent",color:"#553333",border:"none",cursor:"pointer",fontSize:"12px"}},"✕")),
                    // Year
                    e("td",{style:{padding:"2px",borderBottom:"1px solid "+C.border}},
                      e("select",{value:en.yr,onChange:function(ev){updField(en,"yr",+ev.target.value);},
                        style:{background:"#0a1020",color:C.gold,border:"1px solid #1a3a5c",
                          borderRadius:"2px",padding:"2px 3px",fontSize:"10px",fontFamily:"'Courier New',monospace",
                          width:"58px",outline:"none",fontWeight:"bold"}},
                        YEARS.map(function(y){return e("option",{key:y,value:y},y);}))
                    ),
                    // Case type ticks — click to select
                    types.map(function(t){
                      var sel=en.tid===t.id;
                      return e("td",{key:t.id,
                        className:"tick "+(sel?"sel":"unsel"),
                        onClick:function(){setTid(en,t.id);}},
                        sel?"✓":"·"
                      );
                    }),
                    // Flow fields
                    flowFlds.map(function(f){
                      var val=f==="ob"?ob:(en[f]||"");
                      var isAuto=f==="ob"&&isAutoOb;
                      return e("td",{key:f,style:{padding:"2px",borderBottom:"1px solid "+C.border,background:flowColors[f]+"11",borderRight:"1px solid #0e1828"}},
                        e("input",{className:"vi",value:val,type:"number",min:"0",
                          title:isAuto?"Auto-carried from previous month":"",
                          style:{opacity:isAuto?0.6:1},
                          onChange:function(ev){updField(en,f,ev.target.value);}})
                      );
                    }),
                    // Closing
                    e("td",{style:{padding:"4px 6px",textAlign:"center",fontWeight:"bold",
                      borderBottom:"1px solid "+C.border,borderRight:"1px solid "+C.border,
                      color:cl>0?C.greenT:cl<0?C.redT:C.dim}},cl||"-")
                  );
                })
              )
            )
          )
    )
  );
}

// ══════════════════════════════════════
// STATEMENT RENDERER
// ══════════════════════════════════════
function Stmt(p){
  var id=p.id,all=p.all,mk=p.mk,prevMk=p.prevMk,updAll=p.updAll;
  var selM=p.selM,selY=p.selY,ml=p.ml;
  var entries=p.entries, prevEntries=p.prevEntries;

  // Helper aliases — pure, use entries/prevEntries params
  function F(pairs,field,yrs){return sumF(entries,prevEntries,pairs,field,yrs);}
  function Fs(pairs,fields,yrs){return sumFs(entries,prevEntries,pairs,fields,yrs);}
  function ClY(pairs,yr){return sumClY(entries,prevEntries,pairs,yr);}

  function Cl(pairs,yrs){
    var ob=F(pairs,"ob",yrs), inst=F(pairs,"inst",yrs)+F(pairs,"itrf",yrs);
    var disp=Fs(pairs,["dc","dn","dm","dt"],yrs);
    return ob+inst-disp;
  }

  function gMan(key,def){return getManual(all,mk,key,def);}
  function setMan(key,val){updAll(setManual(all,mk,key,val));}
  function FiInp(key,def){
    return e("input",{value:gMan(key,def||"0"),type:"number",min:"0",
      onChange:function(ev){setMan(key,ev.target.value);},
      style:inp({width:"62px",textAlign:"right",background:"#080d14",borderColor:"#1a4a6a"})});
  }
  function FiTd(key){return e("td",{style:{padding:"2px 3px",textAlign:"center",borderBottom:"1px solid "+C.border}},FiInp(key));}

  // UI helpers
  function Hdr(title,sub){
    return e("div",{style:{background:"#060d16",borderBottom:"1px solid "+C.border,padding:"8px 12px",marginBottom:"6px"}},
      e("div",{style:{fontSize:"12px",fontWeight:"bold",color:"#dceeff",marginBottom:sub?"3px":"0"}},title),
      sub?e("div",{style:{fontSize:"10px",color:C.dim}},sub):null);
  }
  function Tbl(body){return e("div",{style:{overflowX:"auto"}},e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"11px"}},body));}
  function Ths(cols){
    return e("tr",null,cols.map(function(c,i){
      return e("th",{key:i,style:{padding:"5px 7px",background:"#090f18",color:C.hdr,
        fontSize:"10px",fontWeight:"bold",textAlign:i===0?"left":"center",
        borderBottom:"1px solid "+C.border,whiteSpace:"nowrap"}},c);
    }));
  }
  function Tdr(cells,bold,hi,grn){
    return e("tr",{style:{background:hi?"#0a1e30":bold?"#0c1828":"#090f18"}},
      cells.map(function(c,i){
        return e("td",{key:i,style:{padding:"5px 7px",
          textAlign:i===0?"left":"center",
          color:grn?C.greenT:bold||hi?"#dceeff":C.text,
          fontWeight:bold||hi?"bold":"normal",
          borderBottom:"1px solid "+C.border}},
          typeof c==="number"?dv(c):c);
      })
    );
  }

  // Totals
  var cOB=F(ALL_PAIRS,"ob"),cInst=F(ALL_PAIRS,"inst")+F(ALL_PAIRS,"itrf");
  var cD=Fs(ALL_PAIRS,["dc","dn","dm"]),cDT=F(ALL_PAIRS,"dt"),cCl=Cl(ALL_PAIRS);

  // ── INFORMATION ──
  if(id==="info") return e("div",null,
    Hdr("Information regarding Civil and Criminal cases in the Court of ACJM, Baghpat for the month of "+ml),
    Tbl(e("tbody",null,
      Ths(["Nature of Case","Opening Balance","Institution","Disposal (Actual)","Disposal (Transfer)","Closing Balance"]),
      Tdr(["Criminal Cases",cOB,cInst||0,cD||0,cDT||0,cCl]),
      Tdr(["Civil Cases","-","-","-","-","-"]),
      Tdr(["Total",cOB,cInst||0,cD||0,cDT||0,cCl],false,true)
    ))
  );

  // ── PENDENCY/ARREARS ──
  if(id==="pendency"){
    var nfOB=F(P_NONFR,"ob"),nfInst=F(P_NONFR,"inst")+F(P_NONFR,"itrf"),nfD=Fs(P_NONFR,["dc","dn","dm"]),nfDT=F(P_NONFR,"dt"),nfCl=Cl(P_NONFR);
    var frOB=F(P_FR,"ob"),frInst=F(P_FR,"inst")+F(P_FR,"itrf"),frD=Fs(P_FR,["dc","dn","dm"]),frDT=F(P_FR,"dt"),frCl=Cl(P_FR);
    var y5=YEARS.filter(function(y){return y<=selY-5;});
    var nfP5=F(P_NONFR,"ob",y5), frP5=F(P_FR,"ob",y5);
    return e("div",null,
      Hdr("Pendency/Arrears for the month of "+ml+" in Court of ACJM, Baghpat"),
      Tbl(e("tbody",null,
        Ths(["Category","Opening (Crl)","Institution","Actual Disposal","Disp. Transfer","Closing","% Change","5yr+ Pendency"]),
        Tdr(["Pendency (Excl. Pre Trial Cases)",nfOB,nfInst||0,nfD||0,nfDT||0,nfCl,"-",nfP5||0]),
        Tdr(["Pre Trial Cases (FR only)",frOB,frInst||0,frD||0,frDT||0,frCl,"-",frP5||0]),
        Tdr(["Total",cOB,cInst||0,cD||0,cDT||0,cCl,"-",(nfP5+frP5)||0],false,true)
      ))
    );
  }

  // ── BREAKUP ──
  if(id==="breakup"){
    var allYrs=YEARS.filter(function(yr){
      return entries.some(function(en){return en.yr===yr;});
    });
    if(allYrs.length===0) allYrs=YEARS.slice(-10);
    return e("div",null,
      Hdr("Information regarding Nature-Wise Pendency of Criminal Cases (MAGISTRATE COURT) with year-wise Breakup as on "+dateStr(selM,selY)),
      e("div",{style:{overflowX:"auto"}},
        e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"11px"}},
          e("tbody",null,
            e("tr",null,
              e("th",{style:{padding:"5px 7px",background:"#090f18",color:C.hdr,textAlign:"left",borderBottom:"1px solid "+C.border,minWidth:"300px",position:"sticky",left:0}},"Nature of Cases"),
              allYrs.map(function(y){return e("th",{key:y,style:{padding:"4px",background:"#090f18",color:C.dim,fontSize:"9px",textAlign:"center",borderBottom:"1px solid "+C.border,minWidth:"44px"}},y);}),
              e("th",{style:{padding:"5px 7px",background:"#090f18",color:C.greenT,textAlign:"center",borderBottom:"1px solid "+C.border}},"Total")
            ),
            BU_ROWS.map(function(row,ri){
              var tot=Cl(row.pairs);
              var bg=ri%2===0?"#090f18":"#0c1420";
              return e("tr",{key:ri,style:{background:bg}},
                e("td",{style:{padding:"4px 7px",color:C.text,borderBottom:"1px solid "+C.border,position:"sticky",left:0,background:bg}},row.lbl),
                allYrs.map(function(yr){var v=ClY(row.pairs,yr);return e("td",{key:yr,style:{padding:"3px",textAlign:"center",color:v?C.text:C.border,borderBottom:"1px solid "+C.border}},v||"");}),
                e("td",{style:{padding:"4px 7px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border}},tot||"")
              );
            }),
            e("tr",{style:{background:"#0a1e30"}},
              e("td",{style:{padding:"5px 7px",color:"#dceeff",fontWeight:"bold",borderBottom:"1px solid "+C.border,position:"sticky",left:0,background:"#0a1e30"}},"Total"),
              allYrs.map(function(yr){return e("td",{key:yr,style:{padding:"3px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border}},ClY(ALL_PAIRS,yr)||"");}),
              e("td",{style:{padding:"4px 7px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border}},cCl||"")
            )
          )
        )
      )
    );
  }

  // ── CONTESTED/NC ──
  if(id==="contested"){
    var dYrs=YEARS.filter(function(yr){return entries.some(function(en){return en.yr===yr;});});
    if(dYrs.length===0) dYrs=YEARS.slice(-12);
    var trP=ALL_CATS.filter(function(p){return p[0]!=="cmc";});
    var mcP=[["fr","fr"],["cmc","cmc"],["cmc","b173"],["cmc","bail"]];
    var cnDefs=[
      {lbl:"Balance at beginning",fn:function(ps,yr){return sumF(entries,prevEntries,ps,"ob",[yr]);}},
      {lbl:"Institution Direct",fn:function(ps,yr){return sumF(entries,prevEntries,ps,"inst",[yr]);}},
      {lbl:"Institution by Transfer",fn:function(ps,yr){return sumF(entries,prevEntries,ps,"itrf",[yr]);}},
      {lbl:"Total Institution",fn:function(ps,yr){return sumF(entries,prevEntries,ps,"inst",[yr])+sumF(entries,prevEntries,ps,"itrf",[yr]);}},
      {lbl:"Disposal Contested",fn:function(ps,yr){return sumF(entries,prevEntries,ps,"dc",[yr]);}},
      {lbl:"Disposal Non-Contested",fn:function(ps,yr){return sumF(entries,prevEntries,ps,"dn",[yr]);}},
      {lbl:"Disposal by Committal",fn:function(ps,yr){return sumF(entries,prevEntries,ps,"dm",[yr]);}},
      {lbl:"Disposal by Transfer",fn:function(ps,yr){return sumF(entries,prevEntries,ps,"dt",[yr]);}},
      {lbl:"Total Disposal",fn:function(ps,yr){return sumFs(entries,prevEntries,ps,["dc","dn","dm","dt"],[yr]);}},
      {lbl:"Closing Balance",fn:function(ps,yr){return sumClY(entries,prevEntries,ps,yr);},bold:true},
    ];
    function CnSect(title,pairs){
      return e("div",{style:{marginBottom:"14px"}},
        e("div",{style:{padding:"5px 12px",background:"#0a1020",color:C.hdr,fontSize:"10px",fontWeight:"bold",borderBottom:"1px solid "+C.border,marginBottom:"2px"}},title),
        e("div",{style:{overflowX:"auto"}},
          e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"10px"}},
            e("tbody",null,
              e("tr",null,
                e("th",{style:{padding:"5px 7px",background:"#090f18",color:C.hdr,textAlign:"left",borderBottom:"1px solid "+C.border,minWidth:"175px",position:"sticky",left:0}},""),
                dYrs.map(function(y){return e("th",{key:y,style:{padding:"4px",background:"#090f18",color:C.dim,fontSize:"9px",textAlign:"center",borderBottom:"1px solid "+C.border,minWidth:"44px"}},y);}),
                e("th",{style:{padding:"5px 6px",background:"#090f18",color:C.greenT,textAlign:"center",borderBottom:"1px solid "+C.border}},"Total")
              ),
              cnDefs.map(function(row,ri){
                var bg2=row.bold?"#0a1e30":ri%2===0?"#090f18":"#0c1420";
                return e("tr",{key:ri,style:{background:bg2}},
                  e("td",{style:{padding:"4px 7px",color:row.bold?"#dceeff":C.text,fontWeight:row.bold?"bold":"normal",borderBottom:"1px solid "+C.border,position:"sticky",left:0,background:bg2}},row.lbl),
                  dYrs.map(function(yr){var v=row.fn(pairs,yr);return e("td",{key:yr,style:{padding:"3px",textAlign:"center",color:row.bold?C.greenT:v?C.text:C.border,fontWeight:row.bold?"bold":"normal",borderBottom:"1px solid "+C.border}},v||"");}),
                  e("td",{style:{padding:"4px 6px",textAlign:"center",color:row.bold?C.greenT:C.text,fontWeight:row.bold?"bold":"normal",borderBottom:"1px solid "+C.border}},
                    dYrs.reduce(function(t,yr){return t+row.fn(pairs,yr);},0)||"")
                );
              })
            )
          )
        )
      );
    }
    return e("div",null,
      Hdr("Statement showing Institution, Disposal and Pendency","Criminal Cases from 01-"+("0"+(selM+1)).slice(-2)+"-"+selY+" to "+lastDay(selM,selY)+"-"+("0"+(selM+1)).slice(-2)+"-"+selY),
      CnSect("Section 1: Criminal Trial Cases (W/S + Summons + Petty)",trP),
      CnSect("Section 2: Criminal Misc (FR / CMC / 173 BNSS / Bail)",mcP),
      e("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:"4px",padding:"10px"}},
        e("div",{style:{fontSize:"10px",color:C.hdr,marginBottom:"8px",fontWeight:"bold"}},"ACTUAL DISPOSAL SUMMARY"),
        e("div",{style:{display:"flex",gap:"20px",flexWrap:"wrap"}},
          [["Contested",Fs(ALL_PAIRS,["dc"])],["Non-Contested",Fs(ALL_PAIRS,["dn"])],
           ["Committal",Fs(ALL_PAIRS,["dm"])],["Transfer",F(ALL_PAIRS,"dt")],
           ["Total Actual",Fs(ALL_PAIRS,["dc","dn","dm"])]
          ].map(function(x){return e("div",{key:x[0],style:{textAlign:"center"}},
            e("div",{style:{fontSize:"9px",color:C.dim,marginBottom:"2px"}},x[0]),
            e("div",{style:{fontSize:"16px",fontWeight:"bold",color:C.greenT}},x[1]||0));})
        )
      )
    );
  }

  // ── APAR DJ ──
  if(id==="apar") return e("div",null,
    Hdr("ANNEXURE – I","NUMBER OF OLD CASES : PENDENCY & DISPOSAL IN BAGHPAT JUDGESHIP FOR THE MONTH OF "+ml.toUpperCase()),
    Tbl(e("tbody",null,
      Ths(["Age Slab","Period","Pendency at Start (Crl)","Inst. by Transfer","Actual Disposal","Disp. by Transfer","Closing Balance"]),
      APAR_SLABS.map(function(s,i){
        var ob=F(P_TRIAL,"ob",s.yrs),iT=F(P_TRIAL,"itrf",s.yrs);
        var d=Fs(P_TRIAL,["dc","dn","dm"],s.yrs),dT=F(P_TRIAL,"dt",s.yrs);
        var cl=Cl(P_TRIAL,s.yrs);
        var bg2=i%2===0?"#090f18":"#0c1420";
        return e("tr",{key:i,style:{background:bg2}},
          e("td",{style:{padding:"6px 7px",color:C.gold,fontWeight:"bold",borderBottom:"1px solid "+C.border}},s.lbl),
          e("td",{style:{padding:"6px 7px",color:C.dim,fontSize:"10px",borderBottom:"1px solid "+C.border}},s.yr),
          e("td",{style:{padding:"6px 7px",textAlign:"center",color:C.text,borderBottom:"1px solid "+C.border}},ob||"-"),
          e("td",{style:{padding:"6px 7px",textAlign:"center",color:C.text,borderBottom:"1px solid "+C.border}},iT||"-"),
          e("td",{style:{padding:"6px 7px",textAlign:"center",color:C.text,borderBottom:"1px solid "+C.border}},d||"-"),
          e("td",{style:{padding:"6px 7px",textAlign:"center",color:C.text,borderBottom:"1px solid "+C.border}},dT||"-"),
          e("td",{style:{padding:"6px 7px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border}},cl)
        );
      })
    )),
    e("div",{style:{fontSize:"9px",color:C.dim,marginTop:"6px"}},"Civil = 0 (ACJM). Cases after 2019 (0-5 yrs) not included.")
  );

  // ── RAPE/MP-MLA ──
  if(id==="rape_mla"){
    var mpP=[["wss","mpmla"]], shP=[["wss","crape"],["wss","sh"]];
    var mp={ob:F(mpP,"ob"),i:F(mpP,"inst")+F(mpP,"itrf"),d:Fs(mpP,["dc","dn","dm"]),dt:F(mpP,"dt"),cl:Cl(mpP)};
    var sh={ob:F(shP,"ob"),i:F(shP,"inst")+F(shP,"itrf"),d:Fs(shP,["dc","dn","dm"]),dt:F(shP,"dt"),cl:Cl(shP)};
    var sesR=[{k:"ses_mp",lbl:"Sessions Court — MP/MLA"},{k:"ses_pocso",lbl:"Sessions Court / POCSO Cases"}];
    return e("div",null,
      Hdr("STATUS OF THE CASES FOR THE MONTH OF "+ml.toUpperCase()),
      Tbl(e("tbody",null,
        Ths(["Category","Opening Balance","Institution","Inst. Transfer","Disposal","Disp. Transfer","Closing"]),
        Tdr(["MP/MLA Cases — ACJM Baghpat",mp.ob,mp.i||0,"-",mp.d||0,mp.dt||0,mp.cl],true),
        Tdr(["Rape / Sexual Harassment — ACJM",sh.ob,sh.i||0,"-",sh.d||0,sh.dt||0,sh.cl],true),
        sesR.map(function(r){
          var ob=N(gMan(r.k+"_ob")),id2=N(gMan(r.k+"_id")),it=N(gMan(r.k+"_it"));
          var d=N(gMan(r.k+"_d")),dt=N(gMan(r.k+"_dt"));
          return e("tr",{key:r.k,style:{background:"#090f18"}},
            e("td",{style:{padding:"5px 7px",color:C.dim,borderBottom:"1px solid "+C.border}},r.lbl," ",e("span",{style:{fontSize:"8px",color:C.border}},"(manual)")),
            [r.k+"_ob",r.k+"_id",r.k+"_it",r.k+"_d",r.k+"_dt"].map(function(k){return FiTd(k);}),
            e("td",{style:{padding:"5px 7px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border}},ob+id2+it-d-dt)
          );
        })
      )),
      e("div",{style:{fontSize:"9px",color:C.dim,marginTop:"4px"}},"Sessions rows manually editable")
    );
  }

  // ── NDPS ──
  if(id==="ndps"){
    var ndP=[["wss","ndps"]];
    var ndYrs=YEARS.filter(function(y){return y>=2001;}).filter(function(y){return entries.some(function(en){return en.gid==="wss"&&en.tid==="ndps"&&en.yr===y;});});
    if(ndYrs.length===0) ndYrs=YEARS.filter(function(y){return y>=2001;}).slice(-15);
    var ndR=[
      {lbl:"Opening Balance",fn:function(yr){return F(ndP,"ob",[yr]);}},
      {lbl:"Institution",fn:function(yr){return F(ndP,"inst",[yr])+F(ndP,"itrf",[yr]);}},
      {lbl:"Disposal",fn:function(yr){return Fs(ndP,["dc","dn","dm","dt"],[yr]);}},
      {lbl:"Closing Balance",fn:function(yr){return Cl(ndP,[yr]);},bold:true},
    ];
    return e("div",null,
      Hdr("Statement regarding year-wise pendency, Institution and Disposal of cases under NDPS Act for quarter ending "+dateStr(selM,selY)),
      e("div",{style:{overflowX:"auto"}},
        e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"11px"}},
          e("tbody",null,
            e("tr",null,
              e("th",{style:{padding:"5px 7px",background:"#090f18",color:C.hdr,textAlign:"left",borderBottom:"1px solid "+C.border,position:"sticky",left:0,minWidth:"120px"}},""),
              ndYrs.map(function(y){return e("th",{key:y,style:{padding:"4px",background:"#090f18",color:C.dim,fontSize:"9px",textAlign:"center",borderBottom:"1px solid "+C.border,minWidth:"44px"}},y);}),
              e("th",{style:{padding:"5px 6px",background:"#090f18",color:C.greenT,textAlign:"center",borderBottom:"1px solid "+C.border}},"Total")
            ),
            ndR.map(function(row,ri){
              var bg2=row.bold?"#0a1e30":ri%2===0?"#090f18":"#0c1420";
              return e("tr",{key:ri,style:{background:bg2}},
                e("td",{style:{padding:"4px 7px",color:row.bold?"#dceeff":C.text,fontWeight:row.bold?"bold":"normal",borderBottom:"1px solid "+C.border,position:"sticky",left:0,background:bg2}},row.lbl),
                ndYrs.map(function(yr){var v=row.fn(yr);return e("td",{key:yr,style:{padding:"3px",textAlign:"center",color:row.bold?C.greenT:v?C.text:C.border,fontWeight:row.bold?"bold":"normal",borderBottom:"1px solid "+C.border}},v||"");}),
                e("td",{style:{padding:"4px 6px",textAlign:"center",color:row.bold?C.greenT:C.text,fontWeight:row.bold?"bold":"normal",borderBottom:"1px solid "+C.border}},ndYrs.reduce(function(t,yr){return t+row.fn(yr);},0)||"")
              );
            })
          )
        )
      )
    );
  }

  // ── PETTY & NI ──
  if(id==="petty_ni"){
    var mvP=[["pet","mv"]], niP=[["smc","ni"]];
    var mv={ob:F(mvP,"ob"),i:F(mvP,"inst")+F(mvP,"itrf"),d:Fs(mvP,["dc","dn"]),cl:Cl(mvP)};
    var niA={ob:F(niP,"ob"),i:F(niP,"inst")+F(niP,"itrf"),d:Fs(niP,["dc","dn"]),cl:Cl(niP)};
    var munCl=N(gMan("mun_ob"))+N(gMan("mun_i"))-N(gMan("mun_d"));
    return e("div",null,
      Hdr("Monthly Progress Report — Petty Offences / NI Act","Court of ACJM Baghpat as on "+ml),
      Tbl(e("tbody",null,
        Ths(["Nature of Cases","Opening Balance","Institution (Direct+Transfer)","Disposal","Closing Balance"]),
        Tdr(["Traffic Challan (Motor Vehicle Act)",mv.ob,mv.i||0,mv.d||0,mv.cl],true),
        e("tr",{style:{background:"#090f18"}},
          e("td",{style:{padding:"5px 7px",color:C.dim,borderBottom:"1px solid "+C.border}},"Municipal Challan ",e("span",{style:{fontSize:"8px",color:C.border}},"(manual)")),
          FiTd("mun_ob"),FiTd("mun_i"),FiTd("mun_d"),
          e("td",{style:{padding:"5px 7px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border}},munCl||"-")),
        Tdr(["Complaint Cases u/s 138 N.I. Act",niA.ob,niA.i||0,niA.d||0,niA.cl],true)
      ))
    );

  // ── PETTY/NON-PETTY ──
  if(id==="petty_np"){
    var tCl=Cl(ALL_PAIRS), pCl=Cl(P_PETTY);
    return e("div",null,
      Hdr("Proforma A","Pendency of Petty / Non-Petty Offences — Judgeship Baghpat as on "+dateStr(selM,selY)),
      Tbl(e("tbody",null,
        Ths(["Court","Total Criminal Cases Pending","Total Petty Offences Pending","Total Non-Petty Offences Pending","Remarks"]),
        e("tr",{style:{background:"#090f18"}},

  }

  // ── MONTHLY PETTY ──
  if(id==="mthly_petty"){
    var pOB=F(P_PETTY,"ob"),pI=F(P_PETTY,"inst")+F(P_PETTY,"itrf"),pD=Fs(P_PETTY,["dc","dn"]);

      Hdr("Proforma C — "+ml),
      Tbl(e("tbody",null,
        Ths(["Col 1 - Pendency at beginning","Col 2 - Institution","Col 3 - Disposal","Col 4 - Fine Realized (Rs.)","Col 5 - Closing Balance","Remarks"]),
        e("tr",{style:{background:"#090f18"}},
          e("td",{style:{padding:"7px",textAlign:"center",color:C.text,borderBottom:"1px solid "+C.border,fontSize:"12px"}},pOB),
          e("td",{style:{padding:"7px",textAlign:"center",color:C.text,borderBottom:"1px solid "+C.border}},pI||"-"),
          e("td",{style:{padding:"7px",textAlign:"center",color:C.text,borderBottom:"1px solid "+C.border}},pD||"-"),
          e("td",{style:{padding:"4px",textAlign:"center",borderBottom:"1px solid "+C.border}},
            e("input",{value:gMan("petty_fine"),type:"number",onChange:function(ev){setMan("petty_fine",ev.target.value);},
              style:inp({width:"90px",textAlign:"center",background:"#080d14",borderColor:"#1a4a6a"})})),
          e("td",{style:{padding:"7px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border,fontSize:"15px"}},pOB+pI-pD),
          e("td",{style:{padding:"7px",borderBottom:"1px solid "+C.border}},"")
        )

    );
  }

  // ── S3 SPECIAL ──
  if(id==="s3"){
    var rpP=[["wss","crape"],["wss","sh"]], cmP=[["wss","crape"],["wss","coth"]];
    var mvS={ob:F([["pet","mv"]],"ob"),i:F([["pet","mv"]],"inst")+F([["pet","mv"]],"itrf"),d:Fs([["pet","mv"]],["dc","dn"])};
    var niS={ob:F([["smc","ni"]],"ob"),i:F([["smc","ni"]],"inst")+F([["smc","ni"]],"itrf"),d:Fs([["smc","ni"]],["dc","dn"])};
    var s3Rows=[
      {sn:1,lbl:"Rape and Sexual Harassment cases",data:[F(rpP,"ob"),F(rpP,"inst")||0,Fs(rpP,["dc","dn"])||0,0,Cl(rpP)]},
      {sn:2,lbl:"Committal Cases (Rape + Other)",data:[F(cmP,"ob"),F(cmP,"inst")||0,Fs(cmP,["dc","dn"])||0,0,Cl(cmP)]},
      {sn:3,lbl:"Traffic Challan (Motor Vehicle Act)",data:[mvS.ob,mvS.i||0,mvS.d||0,0,Cl([["pet","mv"]])]},
      {sn:4,lbl:"Complaint Cases u/s 138 N.I. Act",data:[niS.ob,niS.i||0,niS.d||0,0,Cl([["smc","ni"]])]},
      {sn:5,lbl:"Cases related to women",manual:true,key:"s3_women"},
      {sn:6,lbl:"Juvenile cases",manual:true,key:"s3_juv"},
      {sn:7,lbl:"Differently abled persons",manual:true,key:"s3_dis"},
      {sn:8,lbl:"Senior citizens",manual:true,key:"s3_sr"},
      {sn:9,lbl:"UTP in jail > 6 months",manual:true,key:"s3_utp6"},
      {sn:10,lbl:"UTP in jail > 2 years",manual:true,key:"s3_utp2"},
      {sn:11,lbl:"Cases stayed (Sessions/HC)",manual:true,key:"s3_stayed"},
      {sn:12,lbl:"Cases pending committal",manual:true,key:"s3_commit"},
    ];
    return e("div",null,
      Hdr("S3 — Special Category Cases FOR THE MONTH OF "+ml.toUpperCase()),
      Tbl(e("tbody",null,
        Ths(["S.No.","Nature of Cases","No. at beginning","Institution","Decided","Decided Otherwise","Pending at end"]),
        s3Rows.map(function(r){
          if(!r.manual){
            var bg2=r.sn%2===0?"#090f18":"#0c1420";
            return e("tr",{key:r.sn,style:{background:bg2}},
              e("td",{style:{padding:"5px 7px",textAlign:"center",color:C.dim,borderBottom:"1px solid "+C.border}},r.sn),
              e("td",{style:{padding:"5px 7px",color:C.text,borderBottom:"1px solid "+C.border}},r.lbl),
              r.data.map(function(v,j){return e("td",{key:j,style:{padding:"5px 7px",textAlign:"center",color:C.text,borderBottom:"1px solid "+C.border}},dv(v));})
            );
          }
          var ob=N(gMan(r.key+"_ob")),ins=N(gMan(r.key+"_i")),dec=N(gMan(r.key+"_d")),oth=N(gMan(r.key+"_o"));
          var bg3=r.sn%2===0?"#090f18":"#0c1420";
          return e("tr",{key:r.sn,style:{background:bg3}},
            e("td",{style:{padding:"5px 7px",textAlign:"center",color:C.dim,borderBottom:"1px solid "+C.border}},r.sn),
            e("td",{style:{padding:"5px 7px",color:C.dim,borderBottom:"1px solid "+C.border}},r.lbl," ",e("span",{style:{fontSize:"8px",color:C.border}},"(manual)")),
            FiTd(r.key+"_ob"),FiTd(r.key+"_i"),FiTd(r.key+"_d"),FiTd(r.key+"_o"),
            e("td",{style:{padding:"5px 7px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border}},ob+ins-dec-oth)
          );
        })
      ))
    );
  }

  // ── NI BREAKUP ──
  if(id==="ni_breakup"){
    var niP2=[["smc","ni"]];
    var niOB=F(niP2,"ob"),niI=F(niP2,"inst")+F(niP2,"itrf"),niD=Fs(niP2,["dc","dn"]),niCl=Cl(niP2);
    var niYrs=YEARS.filter(function(y){return y>=2010&&entries.some(function(en){return en.gid==="smc"&&en.tid==="ni"&&en.yr===y;});});
    var stTot=N(gMan("ni_app"))+N(gMan("ni_hear"))+N(gMan("ni_fin"));
    var matched=stTot===niCl;
    return e("div",null,
      Hdr("NI Act (Section 138) Breakup — "+ml),
      Tbl(e("tbody",null,
        Ths(["Court","Opening Balance","Institution","Disposal","Closing Balance"]),
        Tdr(["ACJM Baghpat",niOB,niI||0,niD||0,niCl],true,false,true)
      )),
      e("div",{style:{background:C.card,border:"1px solid "+C.border,borderRadius:"4px",padding:"10px",margin:"10px 0"}},
        e("div",{style:{fontSize:"10px",color:C.hdr,marginBottom:"8px",fontWeight:"bold"}},"Stage-wise Pendency (Manual)"),
        e("div",{style:{display:"flex",gap:"16px",flexWrap:"wrap",alignItems:"center"}},
          [["ni_app","Appearance"],["ni_hear","Hearing/Evidence"],["ni_fin","Final Hearing"]].map(function(x){
            return e("div",{key:x[0],style:{textAlign:"center"}},
              e("div",{style:{fontSize:"9px",color:C.dim,marginBottom:"3px"}},x[1]),FiInp(x[0]));
          }),
          e("div",{style:{textAlign:"center"}},e("div",{style:{fontSize:"9px",color:C.dim,marginBottom:"3px"}},"Stage Total"),
            e("div",{style:{fontSize:"16px",fontWeight:"bold",color:matched?C.greenT:C.redT}},stTot)),
          e("div",{style:{textAlign:"center"}},e("div",{style:{fontSize:"9px",color:C.dim,marginBottom:"3px"}},"Should be"),
            e("div",{style:{fontSize:"16px",fontWeight:"bold",color:C.gold}},niCl)),
          (!matched&&stTot>0)?e("div",{style:{fontSize:"9px",color:C.redT,padding:"4px 8px",background:"#1a0808",borderRadius:"3px"}},"⚠ Mismatch"):null
        )
      ),
      niYrs.length>0?e("div",null,
        e("div",{style:{fontSize:"10px",color:C.hdr,marginBottom:"4px",fontWeight:"bold"}},"Year-wise Closing Pendency"),
        e("div",{style:{overflowX:"auto"}},e("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"11px"}},
          e("tbody",null,
            e("tr",null,niYrs.map(function(y){return e("th",{key:y,style:{padding:"4px",background:"#090f18",color:C.dim,fontSize:"9px",textAlign:"center",borderBottom:"1px solid "+C.border,minWidth:"44px"}},y);}),
              e("th",{style:{padding:"5px 6px",background:"#090f18",color:C.greenT,textAlign:"center",borderBottom:"1px solid "+C.border}},"Total")),
            e("tr",{style:{background:"#090f18"}},niYrs.map(function(yr){var v=ClY(niP2,yr);return e("td",{key:yr,style:{padding:"4px",textAlign:"center",color:v?C.text:C.border,borderBottom:"1px solid "+C.border}},v||"");}),
              e("td",{style:{padding:"4px 6px",textAlign:"center",color:C.greenT,fontWeight:"bold",borderBottom:"1px solid "+C.border}},niCl))
          )
        ))
      ):null
    );
  }

  return e("div",{style:{color:C.dim,padding:"20px"}},"Statement not found.");
}

// ══════════════════════════════════════
// XLSX EXPORT
// ══════════════════════════════════════
function doExport(all,mk,prevMk,selM,selY){
  try{
    var entries=getEntries(all,mk);
    var prevEntries=getPrevEntries(all,prevMk);
    var ml2=monthStr(selM,selY);
    function F(pairs,field,yrs){return sumF(entries,prevEntries,pairs,field,yrs);}
    function Fs(pairs,fields,yrs){return sumFs(entries,prevEntries,pairs,fields,yrs);}
    function Cl(pairs,yrs){return F(pairs,"ob",yrs)+F(pairs,"inst",yrs)+F(pairs,"itrf",yrs)-Fs(pairs,["dc","dn","dm","dt"],yrs);}
    function ClY(pairs,yr){return sumClY(entries,prevEntries,pairs,yr);}
    function gMan(key,def){return getManual(all,mk,key,def);}

    var wb=XLSX.utils.book_new();
    function addS(n,rows){var ws=XLSX.utils.aoa_to_sheet(rows);try{XLSX.utils.book_append_sheet(wb,ws,n.substring(0,31));}catch(x){}}

    var allYrs=YEARS.filter(function(yr){return entries.some(function(en){return en.yr===yr;});});
    var dYrs=allYrs.length>0?allYrs:YEARS.slice(-12);
    var ndYrs2=YEARS.filter(function(y){return y>=2001&&entries.some(function(en){return en.gid==="wss"&&en.tid==="ndps"&&en.yr===y;});});
    if(ndYrs2.length===0) ndYrs2=YEARS.filter(function(y){return y>=2001;}).slice(-15);
    var cOB2=F(ALL_PAIRS,"ob"),cInst2=F(ALL_PAIRS,"inst")+F(ALL_PAIRS,"itrf");
    var cD2=Fs(ALL_PAIRS,["dc","dn","dm"]),cDT2=F(ALL_PAIRS,"dt"),cCl2=Cl(ALL_PAIRS);
    var mpP2=[["wss","mpmla"]],shP2=[["wss","crape"],["wss","sh"]];
    var mvP2=[["pet","mv"]],niP2=[["smc","ni"]];
    var y52=YEARS.filter(function(y){return y<=selY-5;});

    addS("Information",[["Information regarding Civil and Criminal cases in the Court of ACJM, Baghpat for the month of "+ml2],[],
      ["Nature","Opening","Institution","Disposal (Actual)","Disposal (Transfer)","Closing"],
      ["Criminal",cOB2,cInst2,cD2,cDT2,cCl2],["Civil","-","-","-","-","-"],["Total",cOB2,cInst2,cD2,cDT2,cCl2]]);

    addS("Pendency Arrears",[["Pendency/Arrears for the month of "+ml2+" in Court of ACJM, Baghpat"],[],
      ["Category","Opening(Crl)","Institution","Actual Disposal","Disp.Transfer","Closing","5yr+ Pendency"],
      ["Pendency (Excl. Pre Trial)",F(P_NONFR,"ob"),F(P_NONFR,"inst")+F(P_NONFR,"itrf"),Fs(P_NONFR,["dc","dn","dm"]),F(P_NONFR,"dt"),Cl(P_NONFR),F(P_NONFR,"ob",y52)],
      ["Pre Trial (FR only)",F(P_FR,"ob"),F(P_FR,"inst")+F(P_FR,"itrf"),Fs(P_FR,["dc","dn","dm"]),F(P_FR,"dt"),Cl(P_FR),F(P_FR,"ob",y52)],
      ["Total",cOB2,cInst2,cD2,cDT2,cCl2,F(P_NONFR,"ob",y52)+F(P_FR,"ob",y52)]]);

    addS("Breakup",[["Nature-Wise Pendency of Criminal Cases (MAGISTRATE COURT) as on "+dateStr(selM,selY)],[],
      ["S.N.","Nature of Cases"].concat(dYrs).concat(["Total"])].concat(
      BU_ROWS.map(function(r,i){return [i+1,r.lbl].concat(dYrs.map(function(yr){return ClY(r.pairs,yr);})).concat([Cl(r.pairs)]);})).concat(
      [["","Total"].concat(dYrs.map(function(yr){return ClY(ALL_PAIRS,yr);})).concat([cCl2])]));

    addS("Rape MP MLA",[["STATUS OF THE CASES FOR THE MONTH OF "+ml2.toUpperCase()],[],
      ["Category","Opening","Institution","Inst.Transfer","Disposal","Disp.Transfer","Closing"],
      ["MP/MLA (ACJM)",F(mpP2,"ob"),F(mpP2,"inst"),F(mpP2,"itrf"),Fs(mpP2,["dc","dn","dm"]),F(mpP2,"dt"),Cl(mpP2)],
      ["Rape/SH (ACJM)",F(shP2,"ob"),F(shP2,"inst"),F(shP2,"itrf"),Fs(shP2,["dc","dn","dm"]),F(shP2,"dt"),Cl(shP2)],
      ["Sessions MP/MLA",N(gMan("ses_mp_ob")),N(gMan("ses_mp_id")),N(gMan("ses_mp_it")),N(gMan("ses_mp_d")),N(gMan("ses_mp_dt")),N(gMan("ses_mp_ob"))+N(gMan("ses_mp_id"))+N(gMan("ses_mp_it"))-N(gMan("ses_mp_d"))-N(gMan("ses_mp_dt"))],
      ["Sessions POCSO",N(gMan("ses_pocso_ob")),N(gMan("ses_pocso_id")),N(gMan("ses_pocso_it")),N(gMan("ses_pocso_d")),N(gMan("ses_pocso_dt")),N(gMan("ses_pocso_ob"))+N(gMan("ses_pocso_id"))+N(gMan("ses_pocso_it"))-N(gMan("ses_pocso_d"))-N(gMan("ses_pocso_dt"))]]);

    addS("NDPS",[["NDPS Cases — quarter ending "+dateStr(selM,selY)],[],[""].concat(ndYrs2).concat(["Total"]),
      ["Opening"].concat(ndYrs2.map(function(yr){return F([["wss","ndps"]],"ob",[yr]);})).concat([F([["wss","ndps"]],"ob")]),
      ["Institution"].concat(ndYrs2.map(function(yr){return F([["wss","ndps"]],"inst",[yr])+F([["wss","ndps"]],"itrf",[yr]);})).concat([F([["wss","ndps"]],"inst")+F([["wss","ndps"]],"itrf")]),
      ["Disposal"].concat(ndYrs2.map(function(yr){return Fs([["wss","ndps"]],["dc","dn","dm","dt"],[yr]);})).concat([Fs([["wss","ndps"]],["dc","dn","dm","dt"])]),
      ["Closing"].concat(ndYrs2.map(function(yr){return Cl([["wss","ndps"]],[yr]);})).concat([Cl([["wss","ndps"]])])]);

    addS("Petty NI",[["Monthly Progress Report — Petty Offences / NI Act — "+ml2],[],
      ["Nature","Opening","Institution","Disposal","Closing"],
      ["Traffic Challan (MV Act)",F(mvP2,"ob"),F(mvP2,"inst")+F(mvP2,"itrf"),Fs(mvP2,["dc","dn"]),Cl(mvP2)],
      ["Municipal Challan",N(gMan("mun_ob")),N(gMan("mun_i")),N(gMan("mun_d")),N(gMan("mun_ob"))+N(gMan("mun_i"))-N(gMan("mun_d"))],
      ["NI Act (138)",F(niP2,"ob"),F(niP2,"inst")+F(niP2,"itrf"),Fs(niP2,["dc","dn"]),Cl(niP2)]]);

    var tCl3=Cl(ALL_PAIRS),pCl3=Cl(P_PETTY);
    addS("Petty Non-Petty",[["Proforma A — Pendency of Petty/Non-Petty Offences — Judgeship Baghpat as on "+dateStr(selM,selY)],[],
      ["Court","Total Criminal Pending","Petty Pending","Non-Petty Pending"],["ACJM Baghpat",tCl3,pCl3,tCl3-pCl3]]);

    var pOB3=F(P_PETTY,"ob"),pI3=F(P_PETTY,"inst")+F(P_PETTY,"itrf"),pD3=Fs(P_PETTY,["dc","dn"]);
    addS("Monthly Petty",[["Proforma C — "+ml2],[],
      ["Pendency at beginning","Institution","Disposal","Fine Realized (Rs.)","Closing Balance","Remarks"],
      [pOB3,pI3,pD3,N(gMan("petty_fine")),pOB3+pI3-pD3,""]]);

    addS("Apar DJ",[["ANNEXURE - I"],["NUMBER OF OLD CASES - PENDENCY & DISPOSAL IN BAGHPAT JUDGESHIP FOR THE MONTH OF "+ml2.toUpperCase()],[],
      ["Age Slab","Period","Pendency(Crl)","Inst.Transfer","Actual Disposal","Disp.Transfer","Closing"]].concat(
      APAR_SLABS.map(function(s){return [s.lbl,s.yr,F(P_TRIAL,"ob",s.yrs),F(P_TRIAL,"itrf",s.yrs),Fs(P_TRIAL,["dc","dn","dm"],s.yrs),F(P_TRIAL,"dt",s.yrs),Cl(P_TRIAL,s.yrs)];})));

    addS("NI Breakup",[["NI Act (Section 138) Breakup — "+ml2],[],
      ["","Opening","Institution","Disposal","Closing"],["ACJM Baghpat",F(niP2,"ob"),F(niP2,"inst")+F(niP2,"itrf"),Fs(niP2,["dc","dn"]),Cl(niP2)],[],
      ["Stage-wise"],["Appearance",N(gMan("ni_app"))],["Hearing",N(gMan("ni_hear"))],["Final Hearing",N(gMan("ni_fin"))],[],
      ["Year-wise Closing"],["Year"].concat(YEARS.filter(function(y){return y>=2010&&entries.some(function(en){return en.gid==="smc"&&en.tid==="ni"&&en.yr===y;});})).concat(["Total"]),
      ["Closing"].concat(YEARS.filter(function(y){return y>=2010&&entries.some(function(en){return en.gid==="smc"&&en.tid==="ni"&&en.yr===y;});}).map(function(yr){return Cl(niP2,[yr]);})).concat([Cl(niP2)])]);

    XLSX.writeFile(wb,"CourtStatements_"+MONTHS[selM]+selY+"_ACJM.xlsx");
  }catch(ex){alert("Export error: "+ex.message);}
}

</script>
